  function deletePlayer(id){
    if(state.players.length <= 9){ showToast('9人未満にはできません'); return; }
    state.players = state.players.filter(p => p.id !== id);
    state.battingOrder = state.battingOrder.filter(pid => pid !== id);
    delete state.startPositions[id];
    delete state.defenseChanges[id];
    Object.keys(state.lineupByInning).forEach(k => state.lineupByInning[k] = state.lineupByInning[k].filter(pid => pid !== id));
    if(selectedSwapId === id) selectedSwapId = null;
    if(selectedDefense?.playerId === id) selectedDefense = null;
    ensureStructures();
    saveState();
    render();
  }


  function truncateCanvasText(ctx, text, maxWidth){
    text = String(text || '');
    if(ctx.measureText(text).width <= maxWidth) return text;
    let out = text;
    while(out.length > 1 && ctx.measureText(`${out}…`).width > maxWidth) out = out.slice(0, -1);
    return `${out}…`;
  }

  function drawRoundRect(ctx, x, y, w, h, r){
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
  }

  function wrappedLines(ctx, text, maxWidth){
    const words = String(text || '').split(/[、,\s]+/).filter(Boolean);
    const lines = [];
    let current = '';
    words.forEach(word => {
      const next = current ? `${current}、${word}` : word;
      if(current && ctx.measureText(next).width > maxWidth){
        lines.push(current);
        current = word;
      }else{
        current = next;
      }
    });
    if(current) lines.push(current);
    return lines;
  }

  function wrappedItems(ctx, items, maxWidth, separator = '、'){
    const lines = [];
    let current = '';
    items.filter(Boolean).forEach(item => {
      const next = current ? `${current}${separator}${item}` : item;
      if(current && ctx.measureText(next).width > maxWidth){
        lines.push(current);
        current = item;
      }else{
        current = next;
      }
    });
    if(current) lines.push(current);
    return lines;
  }

  function fitCanvasFontSize(ctx, text, maxWidth, weight, startSize, minSize, key = currentFontKey()){
    const safeText = String(text || '');
    let size = startSize;
    while(size > minSize){
      ctx.font = canvasFont(weight, size, key);
      if(ctx.measureText(safeText).width <= maxWidth) break;
      size -= 1;
    }
    return size;
  }

  function loadCanvasImage(src){
    return new Promise(resolve => {
      if(location.protocol === 'file:'){
        resolve(null);
        return;
      }
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = src;
    });
  }

  function drawContainedImage(ctx, img, x, y, w, h){
    const iw = img?.naturalWidth || img?.width || 0;
    const ih = img?.naturalHeight || img?.height || 0;
    if(!iw || !ih) return;
    const scale = Math.min(w / iw, h / ih);
    const dw = iw * scale;
    const dh = ih * scale;
    ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
  }

  function orderImageFileName(st){
    const date = String(st.game?.date || todayText).replaceAll('-','') || 'lineup';
    return `lineup-${date}.png`;
  }

  function shareGameMainLine(st){
    const g = st.game || {};
    const date = formatGameDate(g.date) || '日付未入力';
    const opponent = `vs ${g.opponent || '未入力'}`;
    return [date, g.start || '', opponent].filter(Boolean).join('  ');
  }

  function shareGamePlaceLine(st){
    const place = String(st.game?.place || '').trim();
    return place ? `@${place}` : '';
  }

  function shareInningForState(st){
    const selected = Number(st.selectedInning || 0);
    if(!Number.isFinite(selected) || selected <= 1) return 1;
    return Math.min(maxInnings(st), Math.max(1, selected));
  }

  function shareShowsNumber(st){
    return st.settings?.displayMode === 'fullNumber' || st.settings?.displayMode === 'nickNumber';
  }

  function shareDisplayNameIn(st, id){
    const name = displayNameIn(st, id);
    const number = playerNumberIn(st, id);
    return shareShowsNumber(st) && number ? `${name} #${number}` : name;
  }

  function shareChangePosLabel(pos){
    return pos === 'B' ? 'ベンチ' : posShort(pos);
  }

  function benchPlayersForStateAt(st, inning){
    const lineup = new Set(getLineupAtIn(st, inning));
    return (st.players || []).filter(p => st.battingMode === 'nine' ? !lineup.has(p.id) : effectivePositionIn(st, p.id, inning) === 'B');
  }

  function shareChangeLinesForState(st, inning){
    const end = Math.min(maxInnings(st), Math.max(1, Number(inning || 1)));
    if(end <= 1) return [];
    const orderIndex = Object.fromEntries((st.battingOrder || []).map((id, i) => [id, i]));
    const lines = [];
    for(let current=2; current<=end; current++){
      const beforeLineup = getLineupAtIn(st, current - 1);
      const currentLineup = getLineupAtIn(st, current);
      const activeIds = new Set([...beforeLineup, ...currentLineup, ...(st.players || []).map(p => p.id)]);
      (st.players || [])
        .filter(p => activeIds.has(p.id))
        .map(p => ({
          player: p,
          before: effectivePositionIn(st, p.id, current - 1),
          after: effectivePositionIn(st, p.id, current)
        }))
        .filter(item => item.before !== item.after)
        .sort((a,b) => {
          const aCur = currentLineup.indexOf(a.player.id);
          const bCur = currentLineup.indexOf(b.player.id);
          if(aCur !== -1 || bCur !== -1) return (aCur === -1 ? 999 : aCur) - (bCur === -1 ? 999 : bCur);
          return (orderIndex[a.player.id] ?? 999) - (orderIndex[b.player.id] ?? 999);
        })
        .forEach(item => {
          lines.push(`${current}回 ${shareDisplayNameIn(st, item.player.id)} ${shareChangePosLabel(item.before)} → ${shareChangePosLabel(item.after)}`);
        });
    }
    return lines;
  }

  function sameLineupIn(a, b){
    if(!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
    return a.every((id, index) => id === b[index]);
  }

  function changedDefenseInningsForState(st){
    const innings = new Set();
    const max = maxInnings(st);
    Object.values(st.defenseChanges || {}).forEach(changes => {
      Object.keys(changes || {}).forEach(key => {
        const inning = Number(key);
        if(Number.isFinite(inning) && inning >= 2 && inning <= max) innings.add(inning);
      });
    });
    if(st.battingMode === 'nine'){
      for(let inning=2; inning<=max; inning++){
        if(!sameLineupIn(getLineupAtIn(st, inning), getLineupAtIn(st, inning - 1))) innings.add(inning);
      }
    }
    return Array.from(innings).sort((a,b) => a - b);
  }

  function defenseColumnsForState(st){
    return [
      { key:'start', label:'初', inning:1 },
      ...changedDefenseInningsForState(st).map(inning => ({ key:String(inning), label:String(inning), inning }))
    ];
  }

  function defenseColumnItemIn(st, playerId, column){
    if(!column || column.key === 'start' || column.inning <= 1){
      return { inning:1, pos:st.startPositions?.[playerId] || 'B', start:true };
    }
    const inning = column.inning;
    const before = effectivePositionIn(st, playerId, inning - 1);
    const after = effectivePositionIn(st, playerId, inning);
    const beforeLineup = st.battingMode === 'nine' ? getLineupAtIn(st, inning - 1).includes(playerId) : before !== 'B';
    const afterLineup = st.battingMode === 'nine' ? getLineupAtIn(st, inning).includes(playerId) : after !== 'B';
    if(before === after && beforeLineup === afterLineup) return null;
    return { inning, pos:after || 'B', start:false };
  }

  function drawCanvasCard(ctx, x, y, w, h, radius = 20){
    drawRoundRect(ctx, x, y, w, h, radius);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.strokeStyle = '#d8e5f0';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function drawCanvasDefenseChip(ctx, text, x, y, w, h, type, active, fontKey){
    drawRoundRect(ctx, x, y, w, h, Math.min(16, h / 2));
    ctx.fillStyle = type === 'start' ? '#f5fbff' : '#fff7ed';
    ctx.fill();
    ctx.strokeStyle = active ? '#3b94dd' : (type === 'start' ? '#9bc9f0' : '#fdba74');
    ctx.lineWidth = active ? 4 : 3;
    ctx.stroke();
    ctx.fillStyle = type === 'start' ? '#043e76' : '#7c2d12';
    ctx.font = canvasFont(900, Math.max(18, Math.min(28, h * .62)), fontKey);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, x + w / 2, y + h / 2 + 1);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
  }

  function buildSimpleShareTextForState(sourceState){
    const st = normalizeState(clone(sourceState));
    const lines = [shareGameMainLine(st)];
    const placeLine = shareGamePlaceLine(st);
    if(placeLine) lines.push(placeLine);
    return lines.join('\n');
  }

  async function createOrderImageBlob(sourceState){
    const st = normalizeState(clone(sourceState));
    const imageFontKey = currentFontKey(st);
    await waitForLineupFonts();
    const mascotImage = await loadCanvasImage('assets/splash-order.png');
    const inning = shareInningForState(st);
    const starters = getLineupAtIn(st, inning);
    const bench = benchPlayersForStateAt(st, inning);
    const columns = defenseColumnsForState(st);
    const hasDefenseColumns = columns.length > 1;
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const width = 1080;
    const margin = 46;
    const cardW = width - margin * 2;
    const rowH = hasDefenseColumns ? 82 : 70;
    const headerY = 34;
    const headerH = 176;
    const orderPad = 24;
    const noW = 46;
    const playerW = hasDefenseColumns ? 370 : 650;
    const innerGap = 14;
    const defenseW = cardW - orderPad * 2 - noW - playerW - innerGap * 2;
    const defenseInnerPadX = hasDefenseColumns ? 30 : 18;
    const defenseOuterPadX = hasDefenseColumns ? 18 : 18;
    const defenseContentW = Math.max(80, defenseW - defenseInnerPadX - defenseOuterPadX);
    const colGap = columns.length >= 5 ? 4 : 8;
    const chipW = hasDefenseColumns
      ? Math.max(30, Math.min(58, Math.floor((defenseContentW - colGap * (columns.length - 1)) / columns.length)))
      : 62;
    const chipH = hasDefenseColumns ? Math.max(30, Math.min(42, Math.floor(chipW * .78))) : 42;
    const headerRowH = hasDefenseColumns ? 28 : 0;
    const orderCardH = orderPad + headerRowH + Math.max(starters.length, 1) * rowH + orderPad;
    ctx.font = canvasFont(700, 28, imageFontKey);
    const benchLines = bench.length ? wrappedItems(ctx, bench.map(p => shareDisplayNameIn(st, p.id)), cardW - 64) : ['なし'];
    const benchCardH = 74 + Math.max(benchLines.length, 1) * 38;
    const height = headerY + headerH + 28 + orderCardH + 22 + benchCardH + 46;
    canvas.width = width;
    canvas.height = height;

    ctx.fillStyle = '#eaf8f3';
    ctx.fillRect(0, 0, width, height);

    drawRoundRect(ctx, margin, headerY, cardW, headerH, 34);
    ctx.fillStyle = '#0b6fc6';
    ctx.fill();
    ctx.globalAlpha = 0.14;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(width - margin - 38, headerY + 38, 92, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    const mascotBoxW = 150;
    const mascotBoxH = 130;
    if(mascotImage){
      drawContainedImage(ctx, mascotImage, width - margin - mascotBoxW - 22, headerY + 24, mascotBoxW, mascotBoxH);
    }
    const titleX = margin + 34;
    const titleMaxW = cardW - (mascotImage ? mascotBoxW + 92 : 68);
    ctx.fillStyle = '#ffffff';
    ctx.font = canvasFont(900, 42, imageFontKey);
    ctx.fillText(truncateCanvasText(ctx, shareGameMainLine(st), titleMaxW), titleX, headerY + 78);
    const placeLine = shareGamePlaceLine(st);
    if(placeLine){
      ctx.font = canvasFont(800, 27, imageFontKey);
      ctx.fillText(truncateCanvasText(ctx, placeLine, titleMaxW), titleX, headerY + 126);
    }

    let y = headerY + headerH + 28;
    drawCanvasCard(ctx, margin, y, cardW, orderCardH, 28);
    let rowStartY = y + orderPad + headerRowH;
    const noX = margin + orderPad;
    const playerX = noX + noW + innerGap;
    const defenseX = playerX + playerW + innerGap;
    const defenseContentX = defenseX + defenseInnerPadX;
    if(hasDefenseColumns){
      ctx.textAlign = 'center';
      ctx.font = canvasFont(900, 18, imageFontKey);
      columns.forEach((col, colIndex) => {
        const x = defenseContentX + colIndex * (chipW + colGap);
        const active = col.key === (inning <= 1 ? 'start' : String(inning));
        if(active){
          drawRoundRect(ctx, x - 4, y + orderPad - 4, chipW + 8, 24, 9);
          ctx.fillStyle = '#eaf6ff';
          ctx.fill();
        }
        ctx.fillStyle = active ? '#043e76' : '#64748b';
        ctx.fillText(col.label, x + chipW / 2, y + orderPad + 14);
      });
      ctx.textAlign = 'left';
    }
    starters.forEach((pid, index) => {
      const rowY = rowStartY + index * rowH;
      ctx.fillStyle = '#0867bd';
      ctx.font = canvasFont(900, 33, imageFontKey);
      ctx.textAlign = 'center';
      ctx.fillText(String(index + 1), noX + noW / 2, rowY + rowH / 2 + 11);
      ctx.textAlign = 'left';
      drawRoundRect(ctx, playerX, rowY + 6, playerW, rowH - 12, 18);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#bdd7ef';
      ctx.lineWidth = 3;
      ctx.stroke();
      const player = (st.players || []).find(p => p.id === pid);
      ctx.fillStyle = player?.color || '#94a3b8';
      drawRoundRect(ctx, playerX, rowY + 6, 8, rowH - 12, 18);
      ctx.fill();
      ctx.fillStyle = '#102033';
      const name = displayNameIn(st, pid);
      const number = shareShowsNumber(st) ? playerNumberIn(st, pid) : '';
      const nameX = playerX + 26;
      const numberW = number ? 74 : 0;
      const nameMaxW = playerW - 48 - numberW - (number ? 16 : 0);
      const nameSize = fitCanvasFontSize(ctx, name, nameMaxW, 900, 31, 20, imageFontKey);
      ctx.font = canvasFont(900, nameSize, imageFontKey);
      ctx.fillText(truncateCanvasText(ctx, name, nameMaxW), nameX, rowY + rowH / 2 + 10);
      if(number){
        const numberX = playerX + playerW - numberW - 20;
        drawRoundRect(ctx, numberX, rowY + rowH / 2 - 22, numberW, 44, 14);
        ctx.fillStyle = '#f5fbff';
        ctx.fill();
        ctx.strokeStyle = '#9bc9f0';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#043e76';
        ctx.font = canvasFont(900, 28, imageFontKey);
        ctx.textAlign = 'center';
        ctx.fillText(number, numberX + numberW / 2, rowY + rowH / 2 + 10);
        ctx.textAlign = 'left';
      }
      drawRoundRect(ctx, defenseX, rowY + 6, defenseW, rowH - 12, 18);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.strokeStyle = '#9bc9f0';
      ctx.lineWidth = 3;
      ctx.stroke();
      if(hasDefenseColumns){
        columns.forEach((col, colIndex) => {
          const item = defenseColumnItemIn(st, pid, col);
          if(!item) return;
          const x = defenseContentX + colIndex * (chipW + colGap);
          const chipY = rowY + rowH / 2 - chipH / 2;
          const active = col.key === (inning <= 1 ? 'start' : String(inning));
          drawCanvasDefenseChip(ctx, posShort(item.pos), x, chipY, chipW, chipH, item.start ? 'start' : 'change', active, imageFontKey);
        });
      }else{
        const item = defenseColumnItemIn(st, pid, columns[0]);
        drawCanvasDefenseChip(ctx, posShort(item.pos), defenseContentX, rowY + rowH / 2 - 21, 62, 42, 'start', false, imageFontKey);
      }
    });
    y += orderCardH + 22;

    drawCanvasCard(ctx, margin, y, cardW, benchCardH, 24);
    ctx.fillStyle = '#0b355c';
    ctx.font = canvasFont(900, 30, imageFontKey);
    const benchTitle = bench.length ? `ベンチ（${bench.length}人）` : 'ベンチ';
    ctx.fillText(benchTitle, margin + 32, y + 42);
    ctx.fillStyle = '#102033';
    ctx.font = canvasFont(800, 27, imageFontKey);
    benchLines.forEach((line, idx) => ctx.fillText(line, margin + 32, y + 82 + idx * 38));

    return new Promise((resolve, reject) => {
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('画像生成に失敗しました')), 'image/png', 0.92);
    });
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    link.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function copyShareText(text){
    if(navigator.clipboard?.writeText){
      try{ await navigator.clipboard.writeText(text); return true; }
      catch(e){}
    }
    fallbackCopyText(text);
    return false;
  }

  async function shareOrder(sourceState = state){
    const baseState = sourceState?.players && sourceState?.game ? sourceState : state;
    const st = normalizeState(clone(baseState));
    const text = buildSimpleShareTextForState(st);
    const title = shareGameMainLine(st) || 'オーダー';
    try{
      const blob = await createOrderImageBlob(st);
      const filename = orderImageFileName(st);
      const file = typeof File === 'function' ? new File([blob], filename, { type:'image/png' }) : null;
      if(file && navigator.canShare?.({ files:[file] })){
        try{
          await navigator.share({ title, text, files:[file] });
          showToast('画像を共有しました');
          return;
        }catch(e){
          if(e && e.name === 'AbortError') return;
        }
      }
      downloadBlob(blob, filename);
      await copyShareText(text);
      showToast('画像を保存しました');
      return;
    }catch(e){
      console.warn(e);
    }
    if(navigator.share){
      try{
        await navigator.share({ title, text });
        showToast('共有しました');
        return;
      }catch(e){
        if(e && e.name === 'AbortError') return;
      }
    }
    await copyShareText(text);
    showToast('共有文をコピー');
  }

  function fallbackCopyText(text){
    const area = document.createElement('textarea');
    area.value = text;
    area.setAttribute('readonly','');
    area.style.position = 'fixed';
    area.style.left = '-9999px';
    area.style.top = '0';
    document.body.appendChild(area);
    area.focus();
    area.select();
    try{ document.execCommand('copy'); showToast('共有文をコピー'); }
    catch(e){ showToast('コピーできませんでした'); }
    area.remove();
  }

  function copyMemo(){
    const text = $('saveMemo').value;
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(text).then(() => showToast('コピーしました')).catch(() => fallbackCopy(text));
    }else fallbackCopy(text);
  }

  function fallbackCopy(text){
    $('saveMemo').focus();
    $('saveMemo').select();
    try{ document.execCommand('copy'); showToast('コピーしました'); }
    catch(e){ showToast('コピーできませんでした'); }
  }

  function escapeHtml(value){ return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(value){ return escapeHtml(value); }

  function bindEvents(){
    $('saveBtn').addEventListener('click', saveCurrentOrder);
    $('settingsBtn').addEventListener('click', openSettings);
    $('settingsCloseBtn').addEventListener('click', closeSettings);
    $('settingsDoneBtn').addEventListener('click', closeSettings);
    $('settingsModal').addEventListener('click', e => { if(e.target === $('settingsModal')) closeSettings(); });
    document.addEventListener('keydown', e => { if(e.key === 'Escape' && !$('settingsModal').hidden) closeSettings(); });
    $('battingMode').addEventListener('change', e => setBattingMode(e.target.value));
    $('displayMode').addEventListener('change', e => { state.settings.displayMode = e.target.value; saveState(); render(); });
    $('dhMode').addEventListener('change', e => setDhMode(e.target.value === 'on'));
    $('lineupFont').addEventListener('change', e => setLineupFont(e.target.value));
    $('resetDefenseBtn').addEventListener('click', resetDefense);
    $('orderClearAllChangesBtn').addEventListener('click', clearAllInningChanges);
    $('orderResetDefenseBtn').addEventListener('click', resetCurrentDefense);
    $('copyMemoBtn').addEventListener('click', copyMemo);
    $('shareBtn').addEventListener('click', shareOrder);
    $('shareMemoBtn').addEventListener('click', shareOrder);
    $('historyList').addEventListener('click', handleHistoryAction, { capture:true });
    setupHistorySwipe();
    setupPageSwipe();
    $('refreshMemoBtn').addEventListener('click', () => { renderMemo(); showToast('メモ更新'); });
    $('gameDateBtn').addEventListener('click', e => {
      e.stopPropagation();
      toggleDateCalendar();
    });
    $('dateCalendar').addEventListener('click', e => e.stopPropagation());

    const gameInputs = [
      ['gamePlace','place'], ['gameStart','start'], ['gameFormat','format'],
      ['gameLimit','limit'], ['gameInnings','innings'], ['gameOpponent','opponent']
    ];
    gameInputs.forEach(([id,key]) => {
      $(id).addEventListener('change', e => {
        state.game[key] = key === 'innings' ? Number(e.target.value) : e.target.value;
        selectedSwapId = null;
        selectedDefense = null;
        ensureStructures(); saveState(); render();
      });
      $(id).addEventListener('input', e => {
        state.game[key] = key === 'innings' ? Number(e.target.value) : e.target.value;
        renderGameSummary();
        saveState();
      });
    });
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
  }

  setupStartupSplash();
  setupZoomGuards();
  bindEvents();
  render();
  saveState();
})();
</script>
