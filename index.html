<!doctype html>
<html lang="ja" class="splash-pending">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#072b57" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="打順プランナー" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>打順プランナー</title>
  <script>
    window.LINEUP_APP_VERSION = '2026-06-26-share-defense-chip-padding';
    console.log('lineup-app version', window.LINEUP_APP_VERSION);
    (() => {
      const SPLASH_KEY = 'lineupSplashSeen';
      let showSplash = true;
      try{
        const force = new URLSearchParams(window.location.search).get('splash') === '1';
        showSplash = force || sessionStorage.getItem(SPLASH_KEY) !== '1';
      }catch(e){
        showSplash = true;
      }
      document.documentElement.classList.toggle('splash-pending', showSplash);
      try{
        const fontKey = localStorage.getItem('lineupPlannerFontFamily') || 'standard';
        const allowed = new Set(['standard','biz-ud','biz-udp','noto','mplus','zen']);
        document.documentElement.classList.add(`font-${allowed.has(fontKey) ? fontKey : 'standard'}`);
      }catch(e){
        document.documentElement.classList.add('font-standard');
      }
    })();
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="assets/icons/favicon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    :root{
      --bg:#edf6f2;
      --panel:#ffffff;
      --ink:#102033;
      --muted:#667085;
      --blue:#0867bd;
      --blue-dark:#043e76;
      --line:#d8e5f0;
      --soft:#f5f9fc;
      --green:#13824f;
      --warn:#ad5a00;
      --danger:#b42318;
      --shadow:0 8px 20px rgba(16,32,51,.10);

    *{box-sizing:border-box}

    html.font-standard{--font-app:var(--font-ui)}

    html.font-biz-udp{--font-app:"BIZ UDPGothic","BIZ UDGothic",var(--font-ui)}
    html.font-noto{--font-app:"Noto Sans JP",var(--font-ui)}
    html.font-mplus{--font-app:"M PLUS 1p",var(--font-ui)}
    html.font-zen{--font-app:"Zen Kaku Gothic New",var(--font-ui)}
    body{
      margin:0;
      font-family:var(--font-app);
      background:var(--bg);
      color:var(--ink);
      min-height:100svh;
      touch-action:manipulation;
      overscroll-behavior:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-tap-highlight-color:transparent;

    .app,.settings-modal,.bottom-nav,.toast,.startup-splash{font-family:var(--font-app)}
    button,input,select,textarea{font:inherit;font-family:var(--font-app)}

    button{cursor:pointer;-webkit-tap-highlight-color:transparent}

    html.font-biz-ud .player-name-text,html.font-biz-ud .pos-chip,html.font-biz-ud .player-number-badge,
    html.font-biz-udp .player-name-text,html.font-biz-udp .pos-chip,html.font-biz-udp .player-number-badge{font-weight:700}
    html.font-noto .player-name-text,html.font-noto .pos-chip,html.font-noto .player-number-badge,
    html.font-mplus .player-name-text,html.font-mplus .pos-chip,html.font-mplus .player-number-badge,
    html.font-zen .player-name-text,html.font-zen .pos-chip,html.font-zen .player-number-badge{font-weight:800}
    html.font-mplus .player-name-text,html.font-mplus .pos-chip,html.font-mplus .player-number-badge{letter-spacing:.01em}

      position:fixed;
      inset:0;
      z-index:9999;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px 18px calc(28px + env(safe-area-inset-bottom));
      background:radial-gradient(circle at 50% 38%, #ffffff 0%, #f5fbf8 46%, #dff2e9 100%);
      opacity:0;
      pointer-events:none;
      transition:opacity .28s ease;
    }
    .startup-splash[hidden]{display:none!important}
    html.splash-pending .app{visibility:hidden;opacity:0}
    html.splash-pending .startup-splash,.startup-splash.is-visible{opacity:1;pointer-events:auto;animation:splashBackdrop .32s ease-out both}
    .startup-splash.is-hiding{opacity:0;pointer-events:none}
    .splash-inner{display:grid;justify-items:center;gap:10px;text-align:center;color:var(--blue-dark)}

      height:auto;
      object-fit:contain;
      filter:drop-shadow(0 12px 20px rgba(16,32,51,.14));
      animation:splashImageIn 1.15s cubic-bezier(.2,.8,.2,1) .16s both;
    }
    .splash-fallback{
      display:none;

      min-height:150px;
      place-items:center;
      border:2px solid #bfe0cc;
      border-radius:24px;
      background:#fff;
      color:var(--danger);
      font-size:34px;
      font-weight:950;
      letter-spacing:.03em;
      box-shadow:0 12px 22px rgba(16,32,51,.10);
      animation:splashImageIn 1.15s cubic-bezier(.2,.8,.2,1) .16s both;
    }
    .startup-splash.image-missing .splash-image{display:none}
    .startup-splash.image-missing .splash-fallback{display:grid}
    .splash-title{font-size:22px;font-weight:950;line-height:1.1;opacity:0;animation:splashTextIn .42s ease-out 1.05s both}
    .splash-sub{color:var(--green);font-size:13px;font-weight:900;opacity:0;animation:splashTextIn .42s ease-out 1.18s both}
    .app{
      width:100%;
      max-width:560px;
      margin:0 auto;

      position:sticky;
      top:0;
      z-index:20;
      background:rgba(237,246,242,.96);
      backdrop-filter:blur(10px);
      padding:5px 0 5px;
      border-bottom:1px solid rgba(216,229,240,.72);
    }

    .title-text{min-width:0;flex:1;font-weight:950;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .save-chip{display:none;color:var(--muted);font-size:11px;font-weight:900;white-space:nowrap}
    .save-btn,.share-btn,.settings-btn{border:0;border-radius:11px;height:31px;padding:0 9px;font-weight:950;white-space:nowrap}.save-btn{background:var(--blue);color:#fff}.share-btn{background:#ecfbf2;color:var(--green);border:1px solid #bfe0cc}.settings-btn{background:#fff;color:var(--blue-dark);border:1px solid var(--line);min-width:36px}

    }
    .game-line input:focus,.game-line select:focus,.date-button:focus,.toolbar select:focus,.player-row input:focus,textarea:focus,.setting-field select:focus{border-color:#3b94dd;box-shadow:0 0 0 3px rgba(8,103,189,.12)}
    .date-field{flex:1.12}.place-field{flex:.95}.time-field{flex:.70}.format-field{flex:.82}.limit-field{flex:.54}.innings-field{flex:.60}.opponent-field{flex:1.33}

    .calendar-head{display:grid;grid-template-columns:40px minmax(0,1fr) 40px;align-items:center;gap:6px}

    .calendar-weekday.is-sunday{color:#b42318}
    .calendar-empty{min-height:44px}
    .calendar-day{position:relative;min-width:0;height:44px;border:1px solid transparent;border-radius:10px;background:#f8fbfd;color:var(--ink);font-size:13px;font-weight:950;padding:0}
    .calendar-day.is-saturday:not(.is-selected){color:#0867bd;background:#f3f9ff}

    .toolbar button{grid-column:1 / -1;padding:0 9px;font-weight:950;white-space:nowrap}

    .inning-btn.initial{min-width:52px;background:#eef8ff;border-color:#b9d7ef}.inning-btn.initial.active{background:var(--blue-dark);border-color:var(--blue-dark);color:#fff}
    .tiny-note{display:flex;align-items:center;gap:5px;color:var(--muted);font-size:11px;font-weight:850;margin:0 0 6px;line-height:1.35}
    .tabs-viewport{min-height:calc(100dvh - 126px - env(safe-area-inset-bottom));overflow-x:hidden;overflow-y:visible;touch-action:pan-y}
    .tabs-track{display:flex;width:100%;min-height:inherit;transform:translate3d(0,0,0);transition:transform .18s cubic-bezier(.2,.8,.2,1);will-change:transform;touch-action:pan-y}

    .panel{display:block;flex:0 0 100%;width:100%;min-height:calc(100dvh - 126px - env(safe-area-inset-bottom));touch-action:pan-y}
    #orderPanel{order:0}#historyPanel{order:1}#playersPanel{order:2}
    .panel:not(.active){height:0;overflow:hidden;pointer-events:none}
    .tabs-track.is-dragging .panel{height:auto;overflow:visible;pointer-events:auto}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

    .order-card .card-head{border:1px solid var(--line);border-radius:13px;background:#fbfdff;box-shadow:0 3px 8px rgba(16,32,51,.05)}
    .card-head h2{margin:0;font-size:14px;line-height:1.1;letter-spacing:.01em}.subhead{color:var(--muted);font-size:11px;font-weight:850;white-space:nowrap}
    .order-head h2{min-width:0}.order-head-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;min-width:0;flex:0 0 auto}.order-reset-btn{height:31px;min-width:92px;border:1px solid #bdd7ef;border-radius:10px;background:#fff;color:var(--blue-dark);font-size:12px;font-weight:950;padding:0 8px;white-space:nowrap;box-shadow:0 2px 7px rgba(16,32,51,.045);touch-action:manipulation}.order-reset-btn:active{opacity:.82;transform:translateZ(0) scale(.98)}.order-reset-btn:disabled{opacity:.45;box-shadow:none;pointer-events:none}
    .row-list{background:#fff}
    .defense-grid-header{display:grid;grid-template-columns:30px minmax(0,1fr);align-items:center;gap:7px;padding:6px 2px 0}.defense-grid-header.is-empty{display:none}.defense-grid-head-main{min-width:0;display:grid;grid-template-columns:minmax(0,.9fr) minmax(158px,1fr);align-items:center;gap:7px}.defense-grid-player-spacer{min-width:0}.defense-grid-cols{padding:0 6px;box-sizing:border-box}.defense-cols{min-width:0;display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-start;gap:6px}.defense-col-head{width:48px;height:18px;border-radius:7px;color:#64748b;font-size:10px;font-weight:950;line-height:18px;text-align:center}.defense-col-head.is-active{background:#eaf6ff;color:var(--blue-dark)}
    .order-card .row-list{display:grid;gap:6px;background:transparent;padding:5px 2px 0}
    .order-row{position:relative;background:transparent;border:0}.order-row:last-child{border-bottom:0}
    .order-card .order-row{border:0;border-radius:0;box-shadow:none;overflow:visible}

    .order-main{position:relative;display:grid;grid-template-columns:30px minmax(0,1fr);align-items:stretch;gap:7px;min-height:44px;padding:0}
    .order-no{color:var(--blue);font-size:21px;line-height:1;font-weight:950;text-align:center;display:flex;align-items:center;justify-content:center}
    .player-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    .player-number-badge{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;min-width:42px;height:34px;padding:0 8px;border:2px solid #8bc4ef;border-radius:11px;background:#fff;color:#043e76;font-size:16px;font-weight:950;line-height:1;box-shadow:0 2px 6px rgba(8,103,189,.10)}

      min-width:0;display:grid;grid-template-columns:minmax(0,.9fr) minmax(158px,1fr);gap:7px;border-radius:15px;

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'lineupPlannerV10OrderInlineGame';
  const HISTORY_KEY = 'lineupPlannerSavedOrders';
  const MAX_SAVED_ORDERS = 50;
  const STARTUP_SPLASH_KEY = 'lineupSplashSeen';
  const FONT_KEY = 'lineupPlannerFontFamily';
  const FONT_OPTIONS = ['standard','biz-ud','biz-udp','noto','mplus','zen'];
  const TAB_ORDER = ['order','history','players'];
  const HISTORY_SWIPE_OPEN_PX = 92;
  const HISTORY_SWIPE_THRESHOLD_PX = 96;
  const PAGE_SWIPE_THRESHOLD_PX = 28;
  const PAGE_SWIPE_FLICK_PX = 14;
  const PAGE_SWIPE_VELOCITY_PX_MS = 0.18;
  const PAGE_SWIPE_EDGE_MAX_PX = 28;
  const PAGE_SWIPE_LOCK_PX = 4;
  const PAGE_TAP_CANCEL_PX = 10;
  const PAGE_SWIPE_HORIZONTAL_RATIO = 1.03;
  const PAGE_SWIPE_VERTICAL_CANCEL_RATIO = 1.35;
  const MIGRATION_KEYS = ['lineupPlannerV9OrderTapShare','lineupPlannerV8InlineSwap','lineupPlannerV7InlineDefense','lineupPlannerV6TapCompact','lineupPlannerV5CompactIphone','lineupPlannerV4Iphone'];
  const JAPANESE_HOLIDAYS = {
    '2026-01-01':'元日',
    '2026-01-12':'成人の日',
    '2026-02-11':'建国記念の日',
    '2026-02-23':'天皇誕生日',
    '2026-03-20':'春分の日',
    '2026-04-29':'昭和の日',
    '2026-05-03':'憲法記念日',
    '2026-05-04':'みどりの日',
    '2026-05-05':'こどもの日',
    '2026-05-06':'振替休日',
    '2026-07-20':'海の日',
    '2026-08-11':'山の日',
    '2026-09-21':'敬老の日',
    '2026-09-22':'国民の休日',
    '2026-09-23':'秋分の日',
    '2026-10-12':'スポーツの日',
    '2026-11-03':'文化の日',
    '2026-11-23':'勤労感謝の日'
  };
  const FIELD_POSITIONS = [
    { code:'1', short:'投' }, { code:'2', short:'捕' }, { code:'3', short:'一' },
    { code:'4', short:'二' }, { code:'5', short:'三' }, { code:'6', short:'遊' },
    { code:'7', short:'左' }, { code:'8', short:'中' }, { code:'9', short:'右' }
  ];
  const POSITIONS = [...FIELD_POSITIONS, { code:'DH', short:'DH' }, { code:'B', short:'ベ' }];
  const POS_SHORT = Object.fromEntries(POSITIONS.map(p => [p.code, p.short]));
  const ABSOLUTE_MAX_INNINGS = 9;
  const DEFAULT_COLORS = ['#e85d04','#1b8a5a','#2f80ed','#8a4ce8','#cc3bd9','#e3342f','#1492a8','#5b8c2a','#b76e00','#4338ca','#0f766e','#be185d','#0369a1','#ca8a04'];
  const today = new Date();
  const todayText = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().slice(0,10);
  const defaultPlayers = [
    { id:'p1', nickname:'はると', fullName:'', number:'', color:'#e85d04', status:'' },
    { id:'p2', nickname:'ひなた', fullName:'', number:'', color:'#1b8a5a', status:'' },
    { id:'p3', nickname:'とうり', fullName:'', number:'', color:'#2f80ed', status:'' },
    { id:'p4', nickname:'まほろと', fullName:'', number:'', color:'#8a4ce8', status:'' },
    { id:'p5', nickname:'いっと', fullName:'', number:'', color:'#cc3bd9', status:'' },
    { id:'p6', nickname:'たろう', fullName:'', number:'', color:'#e3342f', status:'' },
    { id:'p7', nickname:'しゅんぺい', fullName:'', number:'', color:'#1492a8', status:'' },
    { id:'p8', nickname:'たいち', fullName:'', number:'', color:'#5b8c2a', status:'' },
    { id:'p9', nickname:'しゅんすけ', fullName:'', number:'', color:'#b76e00', status:'' },
    { id:'p10', nickname:'ゆうと', fullName:'', number:'', color:'#4338ca', status:'' }
  ];
  const defaultStartPositions = { p1:'5', p2:'6', p3:'8', p4:'2', p5:'1', p6:'3', p7:'4', p8:'7', p9:'9', p10:'B' };

  let state = loadState();
  let currentTab = 'order';
  let expandedHistoryId = null;
  let swipedHistoryId = null;
  let historySwipeState = null;
  let pageSwipeState = null;
  let suppressHistoryTapUntil = 0;
  let selectedSwapId = null;
  let selectedDefense = null;
  let swapFadeOutIds = new Set();
  let swapFadeInIds = new Set();
  let defenseSwapFadeOutIds = new Set();
  let defenseSwapFadeInIds = new Set();
  let swapAnimationTimer = null;
  let tapFeedbackIds = new Set();
  let defenseTapFeedbackIds = new Set();
  let tapFeedbackTimer = null;
  const quickTapTimers = new WeakMap();
  let isSwapAnimating = false;
  let calendarMonth = null;
  let tabsTrackFrame = null;
  let tabsTrackPending = null;
  let suppressQuickTapUntil = 0;
  let clearAllChangesArmed = false;
  let clearAllChangesTimer = null;
  const SWAP_FADE_OUT_MS = 90;
  const SWAP_FADE_IN_MS = 120;
  const TAP_FEEDBACK_MS = 120;
  const POINTER_CLICK_GUARD_MS = 220;
  const $ = (id) => document.getElementById(id);

  function clone(value){ return JSON.parse(JSON.stringify(value)); }
  function validFontKey(value){
    const key = String(value || '').trim();
    if(key === 'biz-udgothic') return 'biz-ud';
    if(key === 'biz-udpgothic' || key === 'biz-udp-gothic') return 'biz-udp';
    return FONT_OPTIONS.includes(key) ? key : 'standard';
  }
  function readStoredLineupFont(){
    try{ return validFontKey(localStorage.getItem(FONT_KEY) || 'standard'); }
    catch(e){ return 'standard'; }
  }
  function currentFontKey(st = state){ return validFontKey(st?.settings?.fontFamily || readStoredLineupFont()); }
  function fontFamilyForKey(key = currentFontKey()){
    if(key === 'biz-ud') return '"BIZ UDGothic","BIZ UDPGothic",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    if(key === 'biz-udp') return '"BIZ UDPGothic","BIZ UDGothic",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    if(key === 'noto') return '"Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    if(key === 'mplus') return '"M PLUS 1p",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    if(key === 'zen') return '"Zen Kaku Gothic New",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
    return 'system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif';
  }
  function canvasFont(weight, size, key = currentFontKey()){
    return `${weight} ${size}px ${fontFamilyForKey(key)}`;
  }
  async function waitForLineupFonts(){
    if(!document.fonts?.ready) return;
    try{ await document.fonts.ready; }catch(e){}
  }
  function applyLineupFont(){
    const key = currentFontKey();
    document.documentElement.classList.remove('font-standard','font-biz-ud','font-biz-udp','font-noto','font-mplus','font-zen');
    document.documentElement.classList.add(`font-${key}`);
  }
  function setLineupFont(value){
    const key = validFontKey(value);
    state.settings ||= {};
    state.settings.fontFamily = key;
    try{ localStorage.setItem(FONT_KEY, key); }catch(e){}
    applyLineupFont();
    saveState();
    render();
  }
  function playerById(id){ return state.players.find(p => p.id === id) || null; }
  function isFieldPos(pos){ return FIELD_POSITIONS.some(p => p.code === pos); }
  function isDhEnabled(st = state){ return st?.settings?.dhEnabled === true; }
  function lineupLimit(st = state){ return st?.battingMode === 'nine' ? (isDhEnabled(st) ? 10 : 9) : Number.POSITIVE_INFINITY; }
  function canSetPosition(pos, st = state){ return pos !== 'DH' || isDhEnabled(st); }
  function posShort(pos){ return POS_SHORT[pos || 'B'] || 'ベ'; }
  function maxInnings(st = state){ return Math.min(ABSOLUTE_MAX_INNINGS, Math.max(1, Number(st?.game?.innings || 6))); }
  function isInitialMode(){ return Number(state?.selectedInning || 0) === 0; }
  function activeInning(){
    if(isInitialMode()) return 1;
    const selectedInning = Number(state.selectedInning);
    return Math.min(maxInnings(), Math.max(1, Number.isFinite(selectedInning) ? selectedInning : 1));
  }

  function createDefaultState(){
    const st = {
      version: 10,
      team: { year:'2026', division:'C', name:'旭丘スカイヤーズ' },
      game: { date: todayText, place:'旭丘小', start:'14:00', format:'時間制', limit:'80', innings:6, opponent:'' },
      settings: { displayMode:'nick', dhEnabled:false, fontFamily:readStoredLineupFont() },
      battingMode: 'all',
      selectedInning: 0,
      players: clone(defaultPlayers),
      battingOrder: defaultPlayers.map(p => p.id),
      startPositions: clone(defaultStartPositions),
      defenseChanges: {},
      lineupByInning: {}
    };
    ensureStructures(st);
    return st;
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return normalizeState(JSON.parse(raw));
      for(const key of MIGRATION_KEYS){
        const old = localStorage.getItem(key);
        if(old) return normalizeState(JSON.parse(old));
      }
      return createDefaultState();
    }catch(e){
      return createDefaultState();
    }
  }

  function findPositionInBoard(board, playerId){
    if(!board || !playerId) return 'B';
    for(const p of FIELD_POSITIONS){ if(board[p.code] === playerId) return p.code; }
    return 'B';
  }

  function migrateDefenseBoards(st){
    if(st.defenseChanges && Object.keys(st.defenseChanges).length) return;
    st.defenseChanges = {};
    if(!st.defense) return;
    const inningKeys = Object.keys(st.defense).map(Number).filter(Boolean);
    const innings = Math.min(ABSOLUTE_MAX_INNINGS, Math.max(Number(st.game?.innings || 6), ...inningKeys));
    const firstBoard = st.defense[1];
    if(firstBoard){
      st.players.forEach(p => {
        const pos = findPositionInBoard(firstBoard, p.id);
        if(pos !== 'B') st.startPositions[p.id] = pos;
      });
    }
    for(let i=2; i<=innings; i++){
      const prev = st.defense[i-1];
      const cur = st.defense[i];
      if(!prev || !cur) continue;
      st.players.forEach(p => {
        const before = findPositionInBoard(prev, p.id);
        const after = findPositionInBoard(cur, p.id);
        if(before !== after){
          st.defenseChanges[p.id] ||= {};
          st.defenseChanges[p.id][i] = after;
        }
      });
    }
  }

  function normalizeState(st){
    st ||= createDefaultState();
    const incomingVersion = Number(st.version || 0);
    st.version = 10;
    st.team ||= { year:'2026', division:'C', name:'旭丘スカイヤーズ' };
    st.game ||= { date: todayText, place:'', start:'14:00', format:'時間制', limit:'80', innings:6, opponent:'' };
    st.game.date ||= todayText;
    st.game.opponent ||= '';
    st.game.innings = Math.min(ABSOLUTE_MAX_INNINGS, Math.max(1, Number(st.game.innings || 6)));
    if(incomingVersion < 10) st.selectedInning = 0;
    st.settings ||= {};
    st.settings.displayMode ||= 'nick';
    st.settings.dhEnabled = st.settings.dhEnabled === true;
    st.settings.fontFamily = validFontKey(st.settings.fontFamily || readStoredLineupFont());
    st.battingMode = st.battingMode === 'nine' ? 'nine' : 'all';
    const selectedInning = Number(st.selectedInning);
    st.selectedInning = Number.isFinite(selectedInning) ? selectedInning : 0;
    st.players ||= clone(defaultPlayers);
    st.players.forEach((p, i) => {
      const oldName = p.name || p.nickname || p.fullName || '';
      p.nickname ||= oldName || `選手${i+1}`;
      p.fullName ||= '';
      p.number = p.number || '';
      p.color ||= DEFAULT_COLORS[i % DEFAULT_COLORS.length];
      p.status ||= '';
      delete p.name;
    });
    st.battingOrder ||= st.players.map(p => p.id);
    st.startPositions ||= {};
    const ids = new Set(st.players.map(p => p.id));
    st.battingOrder = st.battingOrder.filter(id => ids.has(id));
    st.players.forEach((p, i) => {
      if(!st.battingOrder.includes(p.id)) st.battingOrder.push(p.id);
      if(!st.startPositions[p.id]) st.startPositions[p.id] = i < 9 ? String(i + 1) : 'B';
    });
    migrateDefenseBoards(st);
    st.lineupByInning ||= {};
    ensureStructures(st);
    return st;
  }

  function hasDhAssigned(st = state){
    if(Object.values(st.startPositions || {}).includes('DH')) return true;
    return Object.values(st.defenseChanges || {}).some(changes => Object.values(changes || {}).includes('DH'));
  }

  function assignInitialDhIfNeeded(st = state){
    if(!isDhEnabled(st) || hasDhAssigned(st)) return;
    const benchId = (st.battingOrder || []).find(id => (st.startPositions?.[id] || 'B') === 'B');
    if(benchId) st.startPositions[benchId] = 'DH';
  }

  function ensureStructures(st = state){
    const gameInnings = maxInnings(st);
    const innings = gameInnings;
    st.game.innings = gameInnings;
    const selectedInning = Number(st.selectedInning);
    st.selectedInning = Math.min(innings, Math.max(0, Number.isFinite(selectedInning) ? selectedInning : 0));
    st.defenseChanges ||= {};
    const ids = new Set(st.players.map(p => p.id));
    Object.keys(st.defenseChanges).forEach(pid => {
      if(!ids.has(pid)){ delete st.defenseChanges[pid]; return; }
      Object.keys(st.defenseChanges[pid]).forEach(k => {
        const n = Number(k);
        const v = st.defenseChanges[pid][k];
        if(!n || n < 2 || n > ABSOLUTE_MAX_INNINGS || !POSITIONS.some(p => p.code === v)) delete st.defenseChanges[pid][k];
      });
      if(Object.keys(st.defenseChanges[pid]).length === 0) delete st.defenseChanges[pid];
    });
    assignInitialDhIfNeeded(st);
    if(st.battingMode === 'nine'){
      const limit = lineupLimit(st);
      if(!st.lineupByInning[1]) st.lineupByInning[1] = st.battingOrder.slice(0,limit);
      Object.keys(st.lineupByInning).forEach(k => {
        const n = Number(k);
        if(!n || n < 1 || n > ABSOLUTE_MAX_INNINGS) delete st.lineupByInning[k];
      });
      let prevLine = st.lineupByInning[1];
      for(let i=1; i<=ABSOLUTE_MAX_INNINGS; i++){
        if(i > innings && !Object.prototype.hasOwnProperty.call(st.lineupByInning, i)) continue;
        const prev = i === 1 ? st.lineupByInning[1] : (prevLine || st.lineupByInning[1]);
        st.lineupByInning[i] ||= clone(prev);
        if(!Array.isArray(st.lineupByInning[i])) st.lineupByInning[i] = [];
        const line = [];
        st.lineupByInning[i].forEach(id => { if(ids.has(id) && !line.includes(id) && line.length < limit) line.push(id); });
        const addable = st.battingOrder.filter(id => ids.has(id) && !line.includes(id));
        while(line.length < limit && addable.length) line.push(addable.shift());
        st.lineupByInning[i] = line;
        prevLine = line;
      }
    } else {
      st.lineupByInning = {};
    }
    cleanupRedundantChanges(st);
  }

  function cleanupRedundantChanges(st = state){
    st.players.forEach(p => {
      const changes = st.defenseChanges[p.id];
      if(!changes) return;
      let current = st.startPositions[p.id] || 'B';
      Object.keys(changes).map(Number).sort((a,b)=>a-b).forEach(i => {
        const next = changes[i];
        if(next === current){ delete changes[i]; }
        else current = next;
      });
      if(Object.keys(changes).length === 0) delete st.defenseChanges[p.id];
    });
  }

  function dateParts(dateStr){
    const match = String(dateStr || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(!match) return null;
    const year = Number(match[1]);
    const month = Number(match[2]) - 1;
    const day = Number(match[3]);
    const date = new Date(year, month, day);
    if(date.getFullYear() !== year || date.getMonth() !== month || date.getDate() !== day) return null;
    return { year, month, day };
  }

  function dateValue(year, month, day){
    return `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  function displayFullDate(dateStr){
    const parts = dateParts(dateStr);
    if(!parts) return String(dateStr || '').replaceAll('-','/');
    return `${parts.year}/${String(parts.month + 1).padStart(2,'0')}/${String(parts.day).padStart(2,'0')}`;
  }

  function setCalendarMonthFromDate(dateStr = state.game.date || todayText){
    const parts = dateParts(dateStr) || dateParts(todayText);
    calendarMonth = { year: parts.year, month: parts.month };

  function shiftCalendarMonth(delta){
    if(!calendarMonth) setCalendarMonthFromDate();
    const base = new Date(calendarMonth.year, calendarMonth.month + delta, 1);
    calendarMonth = { year: base.getFullYear(), month: base.getMonth() };
    renderDateCalendar();
  }

  function holidayName(value){

  function renderDateCalendar(){
    const calendar = $('dateCalendar');
    if(!calendar || calendar.hidden) return;
    if(!calendarMonth) setCalendarMonthFromDate();
    const { year, month } = calendarMonth;
    const selected = state.game.date || todayText;
    const firstDay = new Date(year, month, 1);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const leadingBlanks = (firstDay.getDay() + 6) % 7;
    const weekdays = ['月','火','水','木','金','土','日'];
    calendar.innerHTML = `
      <div class="calendar-head">
        <button class="calendar-nav" type="button" data-calendar-prev aria-label="前月">‹</button>
        <div class="calendar-month">${year}年${month + 1}月</div>
        <button class="calendar-nav" type="button" data-calendar-next aria-label="翌月">›</button>
      </div>
      <div class="calendar-weekdays">${weekdays.map((day, idx) => `<div class="calendar-weekday${idx === 5 ? ' is-saturday' : ''}${idx === 6 ? ' is-sunday' : ''}">${day}</div>`).join('')}</div>
      <div class="calendar-grid"></div>
    `;
    const grid = calendar.querySelector('.calendar-grid');
    for(let i=0; i<leadingBlanks; i++){
      const blank = document.createElement('div');
      blank.className = 'calendar-empty';
      grid.appendChild(blank);
    }
    for(let day=1; day<=daysInMonth; day++){
      const value = dateValue(year, month, day);
      const dayOfWeek = new Date(year, month, day).getDay();
      const holiday = holidayName(value);
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'calendar-day' + (dayOfWeek === 6 ? ' is-saturday' : '') + (dayOfWeek === 0 ? ' is-sunday' : '') + (holiday ? ' is-holiday' : '') + (value === selected ? ' is-selected' : '') + (value === todayText ? ' is-today' : '');
      button.innerHTML = `<span class="calendar-day-number">${day}</span>${holiday ? '<span class="calendar-holiday-label" aria-hidden="true">祝</span>' : ''}`;
      button.title = holiday || '';
      button.setAttribute('aria-label', `${displayFullDate(value)}${holiday ? ` ${holiday}` : ''}`);
      button.addEventListener('click', e => {
        e.stopPropagation();
        selectCalendarDate(value);
      });
      grid.appendChild(button);
    }
    calendar.querySelector('[data-calendar-prev]').addEventListener('click', e => {
      e.stopPropagation();
      shiftCalendarMonth(-1);
    });
    calendar.querySelector('[data-calendar-next]').addEventListener('click', e => {
      e.stopPropagation();
      shiftCalendarMonth(1);
    });
    bindFormControlTapGuards(calendar);
  }

  const FORM_CONTROL_SELECTOR = 'input, select, textarea, button';
  const FORM_CONTROL_GUARD_EVENTS = ['pointerdown', 'touchstart', 'mousedown', 'click'];
  function isFormControl(target){
    return !!target?.closest?.(FORM_CONTROL_SELECTOR);
  }
  function shouldIgnoreNestedFormControlTap(event){
    const control = event.target?.closest?.(FORM_CONTROL_SELECTOR);
    return !!control && control !== event.currentTarget;
  }
  function stopFormControlPropagation(event){
    if(isFormControl(event.target)) event.stopPropagation();
  }
  function bindFormControlTapGuards(root = document){
    root.querySelectorAll(FORM_CONTROL_SELECTOR).forEach(control => {
      if(control.dataset.tapGuardBound === '1') return;
      control.dataset.tapGuardBound = '1';
      FORM_CONTROL_GUARD_EVENTS.forEach(type => control.addEventListener(type, stopFormControlPropagation, { passive:true }));
    });
  }
  function flashTapFeedback(element){
    if(!element || reducedMotion()) return;
    const oldTimer = quickTapTimers.get(element);
    if(oldTimer) clearTimeout(oldTimer);
    element.classList.remove('tap-feedback');
    void element.offsetWidth;
    element.classList.add('tap-feedback');
    quickTapTimers.set(element, setTimeout(() => {
      element.classList.remove('tap-feedback');
      quickTapTimers.delete(element);
    }, TAP_FEEDBACK_MS + 35));
  }
  function bindQuickTap(element, handler, options = {}){
    let handledByPointer = false;
    let tapPointer = null;
    let elementTapHandledUntil = 0;
    const shouldIgnore = (event) => shouldIgnoreNestedFormControlTap(event) || Boolean(options.ignore?.(event));
    const feedbackTarget = (event) => {
      if(typeof options.feedbackElement === 'function') return options.feedbackElement(event) || element;
      if(options.feedbackElement) return options.feedbackElement;
      return element;
    };
    const run = (event) => {
      event.stopPropagation();
      if(Date.now() < suppressQuickTapUntil) return;
      if(shouldIgnore(event)) return;
      handler(event);
    };
    element.addEventListener('pointerdown', event => {
      if(event.pointerType === 'mouse' && event.button !== 0) return;
      if(shouldIgnore(event)) return;
      event.stopPropagation();
      tapPointer = { id:event.pointerId, startX:event.clientX, startY:event.clientY, cancelled:false };
    }, { passive:true });
    element.addEventListener('pointermove', event => {
      if(!tapPointer || tapPointer.id !== event.pointerId) return;
      const dx = event.clientX - tapPointer.startX;
      const dy = event.clientY - tapPointer.startY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);
      if(absX >= PAGE_TAP_CANCEL_PX || absY >= PAGE_TAP_CANCEL_PX) tapPointer.cancelled = true;
      if(absX >= PAGE_TAP_CANCEL_PX && absX > absY * PAGE_SWIPE_HORIZONTAL_RATIO){
        suppressQuickTapUntil = Date.now() + 260;
      }
    }, { passive:true });
    element.addEventListener('pointerup', event => {
      if(event.pointerType === 'mouse' && event.button !== 0) return;
      if(Date.now() < elementTapHandledUntil) return;
      handledByPointer = true;
      event.preventDefault();
      const tap = tapPointer;
      tapPointer = null;
      const dx = tap ? event.clientX - tap.startX : 0;
      const dy = tap ? event.clientY - tap.startY : 0;
      const moved = !tap || tap.cancelled || Math.abs(dx) >= PAGE_TAP_CANCEL_PX || Math.abs(dy) >= PAGE_TAP_CANCEL_PX;
      if(moved || Date.now() < suppressQuickTapUntil){
        event.stopPropagation();
        setTimeout(() => { handledByPointer = false; }, POINTER_CLICK_GUARD_MS);
        return;
      }
      flashTapFeedback(feedbackTarget(event));
      run(event);
      elementTapHandledUntil = Date.now() + POINTER_CLICK_GUARD_MS;
      setTimeout(() => { handledByPointer = false; }, POINTER_CLICK_GUARD_MS);
    });
    element.addEventListener('pointercancel', () => { tapPointer = null; });
    element.addEventListener('click', event => {
      if(handledByPointer || Date.now() < suppressQuickTapUntil || Date.now() < elementTapHandledUntil){
        event.preventDefault();
        event.stopPropagation();
        return;
      }
      run(event);
      elementTapHandledUntil = Date.now() + POINTER_CLICK_GUARD_MS;
    });
  }
  function reducedMotion(){
    return Boolean(window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches);
  }
  function setupStartupSplash(){
    const splash = $('startupSplash');
    if(!splash) return;
    const root = document.documentElement;
    const forceSplash = new URLSearchParams(window.location.search).get('splash') === '1';
    let alreadySeen = false;
    try{ alreadySeen = !forceSplash && sessionStorage.getItem(STARTUP_SPLASH_KEY) === '1'; }
    catch(e){ alreadySeen = false; }
    if(alreadySeen){
      root.classList.remove('splash-pending');
      splash.remove();
      return;
    }
    root.classList.add('splash-pending');
    try{ sessionStorage.setItem(STARTUP_SPLASH_KEY, '1'); }
    catch(e){}
    const image = splash.querySelector('.splash-image');
    image?.addEventListener('error', () => splash.classList.add('image-missing'), { once:true });
    const reduce = reducedMotion();
    const hideDelay = reduce ? 280 : 2200;
    const removeDelay = reduce ? 460 : 2500;
    requestAnimationFrame(() => splash.classList.add('is-visible'));
    window.setTimeout(() => {
      splash.classList.add('is-hiding');
      root.classList.remove('splash-pending');
    }, hideDelay);
    window.setTimeout(() => splash.remove(), removeDelay);
  }
  function clearSwapAnimationState(){
    clearTimeout(swapAnimationTimer);
    swapAnimationTimer = null;
    isSwapAnimating = false;
    swapFadeOutIds.clear();
    swapFadeInIds.clear();
    defenseSwapFadeOutIds.clear();
    defenseSwapFadeInIds.clear();
  }
  function clearTapFeedback(){
    clearTimeout(tapFeedbackTimer);
    tapFeedbackTimer = null;
    tapFeedbackIds.clear();
    defenseTapFeedbackIds.clear();
  }
  function startTapFeedback({ playerIds = [], defenseIds = [] }){
    if(!isSwapAnimating && swapAnimationTimer){
      clearTimeout(swapAnimationTimer);
      swapAnimationTimer = null;
      swapFadeInIds.clear();
      defenseSwapFadeInIds.clear();
    }
    clearTapFeedback();
    if(reducedMotion()) return;
    tapFeedbackIds = new Set(playerIds.filter(id => playerById(id)));
    defenseTapFeedbackIds = new Set(defenseIds.filter(id => playerById(id)));
    tapFeedbackTimer = setTimeout(() => {
      clearTapFeedback();
      render();
    }, TAP_FEEDBACK_MS);
  }
  function startSwapAnimation({ playerIds = [], defenseIds = [], commit }){
    if(isSwapAnimating) return false;
    clearTimeout(swapAnimationTimer);
    swapAnimationTimer = null;
    clearTapFeedback();
    const rowIds = playerIds.filter(id => playerById(id));
    const chipIds = defenseIds.filter(id => playerById(id));
    const outDelay = reducedMotion() ? 0 : SWAP_FADE_OUT_MS;
    const inDelay = reducedMotion() ? 0 : SWAP_FADE_IN_MS;
    isSwapAnimating = true;
    swapFadeOutIds = new Set(rowIds);
    swapFadeInIds.clear();
    defenseSwapFadeOutIds = new Set(chipIds);
    defenseSwapFadeInIds.clear();
    render();
    swapAnimationTimer = setTimeout(() => {
      const done = commit();
      swapFadeOutIds.clear();
      defenseSwapFadeOutIds.clear();
      if(done === false){
        clearSwapAnimationState();
        render();
        return;
      }
      swapFadeInIds = new Set(rowIds);
      defenseSwapFadeInIds = new Set(chipIds);
      isSwapAnimating = false;
      render();
      swapAnimationTimer = setTimeout(() => {
        swapAnimationTimer = null;
        swapFadeInIds.clear();
        defenseSwapFadeInIds.clear();
        render();
      }, inDelay);
    }, outDelay);
    return true;
  }

  function effectivePosition(playerId, inning){
    let pos = state.startPositions[playerId] || 'B';
    const limit = Math.min(maxInnings(), Math.max(1, Number(inning || 1)));
    const changes = state.defenseChanges[playerId] || {};
    for(let i=2; i<=limit; i++){
      if(changes[i]) pos = changes[i];
    }
    return pos || 'B';
  }

  function effectivePositionIn(st, playerId, inning){
    let pos = st.startPositions?.[playerId] || 'B';
    const limit = Math.min(maxInnings(st), Math.max(1, Number(inning || 1)));
    const changes = st.defenseChanges?.[playerId] || {};
    for(let i=2; i<=limit; i++){
      if(changes[i]) pos = changes[i];
    }
    return pos || 'B';
  }

  function playerAtPosition(pos, inning, exceptId=null){
    if(!isFieldPos(pos)) return null;
    return state.players.find(p => p.id !== exceptId && effectivePosition(p.id, inning) === pos)?.id || null;
  }

  function setRawChange(playerId, inning, pos){
    if(inning <= 1){ state.startPositions[playerId] = pos; return; }
    state.defenseChanges[playerId] ||= {};
    state.defenseChanges[playerId][inning] = pos;
  }

  function setPlayerPositionFromInning(playerId, inning, pos, swap=true){
    if(!canSetPosition(pos)) return;
    inning = Math.min(maxInnings(), Math.max(1, Number(inning || 1)));
    const beforePos = effectivePosition(playerId, inning);
    if(swap && isFieldPos(pos)){
      const otherId = playerAtPosition(pos, inning, playerId);
      if(otherId) setRawChange(otherId, inning, beforePos || 'B');
    }
    setRawChange(playerId, inning, pos);
    cleanupRedundantChanges();
  }

  function setStartPosition(playerId, pos){
    if(!canSetPosition(pos)) return;
    const before = state.startPositions[playerId] || 'B';
    if(isFieldPos(pos)){
      const otherId = state.players.find(p => p.id !== playerId && (state.startPositions[p.id] || 'B') === pos)?.id || null;
      if(otherId) state.startPositions[otherId] = before;
    }
    state.startPositions[playerId] = pos;
    cleanupRedundantChanges();
    saveState();
    render();
  }

  function defenseEntries(playerId){
    const changes = state.defenseChanges[playerId] || {};
    return Object.keys(changes).map(Number).sort((a,b)=>a-b).map(inning => ({ inning, pos:changes[inning] }));
  }

  function defenseFlow(playerId){
    return [{ inning:1, pos:state.startPositions[playerId] || 'B', start:true }, ...defenseEntries(playerId).filter(e => e.inning <= maxInnings()).map(e => ({...e, start:false}))];
  }

  function sameLineup(a, b){
    if(!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
    return a.every((id, index) => id === b[index]);
  }

  function changedDefenseInnings(){
    const innings = new Set();
    const max = maxInnings();
    Object.values(state.defenseChanges || {}).forEach(changes => {
      Object.keys(changes || {}).forEach(key => {
        const inning = Number(key);
        if(Number.isFinite(inning) && inning >= 2 && inning <= max) innings.add(inning);
      });
    });
    if(state.battingMode === 'nine'){
      for(let inning = 2; inning <= max; inning++){
        if(!sameLineup(getLineupAt(inning), getLineupAt(inning - 1))) innings.add(inning);
      }
    }
    return Array.from(innings).sort((a,b) => a - b);
  }

  function defenseColumns(){
    return [
      { key:'start', label:'初', inning:1 },
      ...changedDefenseInnings().map(inning => ({ key:String(inning), label:String(inning), inning }))
    ];
  }

  function defenseColumnItem(playerId, column){
    if(!column || column.key === 'start' || column.inning <= 1){
      return { inning:1, pos:state.startPositions[playerId] || 'B', start:true };
    }
    const inning = column.inning;
    const before = effectivePosition(playerId, inning - 1);
    const after = effectivePosition(playerId, inning);
    const beforeLineup = state.battingMode === 'nine' ? getLineupAt(inning - 1).includes(playerId) : before !== 'B';
    const afterLineup = state.battingMode === 'nine' ? getLineupAt(inning).includes(playerId) : after !== 'B';
    if(before === after && beforeLineup === afterLineup) return null;
    return { inning, pos:after || 'B', start:false };
  }

  function activeDefenseColumnKey(){
    const inning = activeInning();
    return isInitialMode() || inning <= 1 ? 'start' : String(inning);
  }

  function getLineupAt(inning){
    ensureStructures();
    inning = Math.min(maxInnings(), Math.max(1, Number(inning || 1)));
    if(state.battingMode === 'all') return state.battingOrder.slice();
    return (state.lineupByInning[inning] || state.lineupByInning[1] || state.battingOrder.slice(0,lineupLimit())).slice();
  }

  function getLineupAtIn(st, inning){
    inning = Math.min(maxInnings(st), Math.max(1, Number(inning || 1)));
    if(st.battingMode === 'all') return (st.battingOrder || []).slice();
    return (st.lineupByInning?.[inning] || st.lineupByInning?.[1] || (st.battingOrder || []).slice(0,lineupLimit(st))).slice();
  }

  function handlePlayerTap(playerId){
    if(isSwapAnimating) return;
    if(!playerById(playerId)) return;
    selectedDefense = null;
    if(isInitialMode()){
      handleInitialOrderTap(playerId);
    }else{
      handleSubstitutionTap(playerId);
    }
  }

  function handleInitialOrderTap(playerId){
    if(isSwapAnimating) return;
    if(!selectedSwapId){
      selectedSwapId = playerId;
      startTapFeedback({ playerIds: [playerId] });
      render();
      return;
    }
    if(selectedSwapId === playerId){
      selectedSwapId = null;
      render();
      return;
    }
    const idA = selectedSwapId;
    const idB = playerId;
    startSwapAnimation({
      playerIds: [idA, idB],
      commit: () => {
        const done = swapInitialOrder(idA, idB);
        selectedSwapId = null;
        if(done) saveState();
        return done;
      }
    });
  }

  function swapInitialOrder(idA, idB){
    if(idA === idB) return false;
    const a = state.battingOrder.indexOf(idA);
    const b = state.battingOrder.indexOf(idB);
    if(a < 0 || b < 0) return false;
    [state.battingOrder[a], state.battingOrder[b]] = [state.battingOrder[b], state.battingOrder[a]];
    if(state.battingMode === 'nine'){
      const oldFirst = (state.lineupByInning[1] || []).slice();
      const hadLineupChanges = Object.keys(state.lineupByInning || {}).some(k => Number(k) > 1 && JSON.stringify(state.lineupByInning[k]) !== JSON.stringify(oldFirst));
      state.lineupByInning[1] = state.battingOrder.slice(0,lineupLimit());
      if(!hadLineupChanges){
        for(let i=1; i<=maxInnings(); i++) state.lineupByInning[i] = state.lineupByInning[1].slice();
      }else{
        for(let i=2; i<=maxInnings(); i++){
          const line = (state.lineupByInning[i] || state.lineupByInning[i-1] || state.lineupByInning[1]).slice();
          const ia = line.indexOf(idA);
          const ib = line.indexOf(idB);
          if(ia >= 0 && ib >= 0) [line[ia], line[ib]] = [line[ib], line[ia]];
          state.lineupByInning[i] = line.slice(0,lineupLimit());
        }
      }
    }
    return true;
  }

  function handleSubstitutionTap(playerId){
    if(isSwapAnimating) return;
    const inning = activeInning();
    if(!selectedSwapId){
      selectedSwapId = playerId;
      startTapFeedback({ playerIds: [playerId] });
      render();
      return;
    }
    if(selectedSwapId === playerId){
      selectedSwapId = null;
      render();
      return;
    }
    const idA = selectedSwapId;
    const idB = playerId;
    startSwapAnimation({
      playerIds: [idA, idB],
      commit: () => {
        const done = state.battingMode === 'nine'
          ? substituteNineMode(idA, idB, inning)
          : substituteAllBattingDefenseOnly(idA, idB, inning);
        selectedSwapId = null;
        if(done){
          cleanupRedundantChanges();
          saveState();
          return true;
        }
        showToast('打順固定中。ベンチ選手と交代できます');
        return false;
      }
    });
  }

  function substituteNineMode(idA, idB, inning){
    const currentLine = getLineupAt(inning);
    const a = currentLine.indexOf(idA);
    const b = currentLine.indexOf(idB);
    if((a >= 0 && b >= 0) || (a < 0 && b < 0)) return false;
    const outId = a >= 0 ? idA : idB;
    const inId = a >= 0 ? idB : idA;
    const slot = a >= 0 ? a : b;
    const outPos = effectivePosition(outId, inning);
    for(let i=inning; i<=maxInnings(); i++){
      const line = getLineupAt(i);
      const idx = line.indexOf(outId);
      if(idx >= 0) line[idx] = inId;
      else if(!line.includes(inId)) line[slot] = inId;
      state.lineupByInning[i] = line.slice(0,lineupLimit());
    }
    setRawChange(outId, inning, 'B');
    setRawChange(inId, inning, outPos || 'B');
    return true;
  }

  function substituteAllBattingDefenseOnly(idA, idB, inning){
    const posA = effectivePosition(idA, inning);
    const posB = effectivePosition(idB, inning);
    const aBench = posA === 'B';
    const bBench = posB === 'B';
    if(aBench === bBench) return false;
    const fieldId = aBench ? idB : idA;
    const benchId = aBench ? idA : idB;
    const fieldPos = effectivePosition(fieldId, inning);
    if(fieldPos === 'DH' && !isDhEnabled()) return false;
    setRawChange(fieldId, inning, 'B');
    setRawChange(benchId, inning, fieldPos || 'B');
    return true;
  }

  function handleDefenseTap(playerId){
    if(isSwapAnimating) return;
    if(!playerById(playerId)) return;
    selectedSwapId = null;
    const inning = activeInning();
    if(!selectedDefense){
      selectedDefense = { playerId, inning };
      startTapFeedback({ defenseIds: [playerId] });
      render();
      return;
    }
    if(selectedDefense.playerId === playerId){
      selectedDefense = null;
      render();
      return;
    }
    const idA = selectedDefense.playerId;
    const idB = playerId;
    startSwapAnimation({
      defenseIds: [idA, idB],
      commit: () => {
        const done = swapDefensePositionsAtInning(idA, idB, inning);
        selectedDefense = null;
        if(done){
          cleanupRedundantChanges();
          saveState();
          return true;
        }
        return false;
      }
    });
  }

  function swapDefensePositionsAtInning(idA, idB, inning){
    if(idA === idB) return false;
    inning = Math.min(maxInnings(), Math.max(1, Number(inning || 1)));
    const posA = effectivePosition(idA, inning);
    const posB = effectivePosition(idB, inning);
    if(posA === posB) return false;
    if(!isDhEnabled() && (posA === 'DH' || posB === 'DH')) return false;
    if(inning <= 1){
      state.startPositions[idA] = posB;
      state.startPositions[idB] = posA;
      return true;
    }
    setRawChange(idA, inning, posB);
    setRawChange(idB, inning, posA);
    return true;
  }

  function setBattingMode(mode){
    state.battingMode = mode;
    state.selectedInning = 0;
    state.defenseChanges = {};
    state.lineupByInning = {};
    if(mode === 'nine') state.lineupByInning[1] = state.battingOrder.slice(0,lineupLimit());
    selectedSwapId = null;
    selectedDefense = null;
    ensureStructures();
    saveState();
    render();
    showToast(mode === 'nine' ? '9人制に変更' : '全員打ちに変更');
  }

  function setDhMode(enabled){
    state.settings.dhEnabled = enabled === true;
    selectedSwapId = null;
    selectedDefense = null;
    clearTapFeedback();
    clearSwapAnimationState();
    if(state.settings.dhEnabled) assignInitialDhIfNeeded();
    ensureStructures();
    saveState();
    render();
  }

  function resetInitialDefensePositions(){
    state.players.forEach((p, i) => state.startPositions[p.id] = i < 9 ? String(i + 1) : 'B');
    assignInitialDhIfNeeded();
  }

  function resetDefense(){
    state.defenseChanges = {};
    resetInitialDefensePositions();
    state.lineupByInning = {};
    if(state.battingMode === 'nine') state.lineupByInning[1] = state.battingOrder.slice(0,lineupLimit());
    selectedSwapId = null;
    selectedDefense = null;
    clearTapFeedback();
    clearSwapAnimationState();
    ensureStructures();
    saveState();
    render();
    showToast('守備を初期化');
  }

  function resetCurrentDefense(){
    selectedSwapId = null;
    selectedDefense = null;
    clearTapFeedback();
    clearSwapAnimationState();
    if(isInitialMode()){
      render();
      return;
    }
    const inning = activeInning();
    Object.keys(state.defenseChanges || {}).forEach(pid => {
      if(!state.defenseChanges[pid]) return;
      delete state.defenseChanges[pid][inning];
      if(Object.keys(state.defenseChanges[pid]).length === 0) delete state.defenseChanges[pid];
    });
    ensureStructures();
    saveState();
    render();
  }

  function hasRecordedOrderChanges(){
    return changedDefenseInnings().length > 0;
  }

  function resetClearAllChangesConfirm(){
    clearAllChangesArmed = false;
    clearTimeout(clearAllChangesTimer);
    const btn = $('orderClearAllChangesBtn');
    if(btn) btn.textContent = '交代クリア';
  }

  function clearAllInningChanges(){
    selectedSwapId = null;
    selectedDefense = null;
    clearTapFeedback();
    clearSwapAnimationState();
    if(!isInitialMode()){
      resetClearAllChangesConfirm();
      render();
      return;
    }
    if(!hasRecordedOrderChanges()){
      resetClearAllChangesConfirm();
      render();
      showToast('クリアする交代はありません');
      return;
    }
    if(!clearAllChangesArmed){
      clearAllChangesArmed = true;
      const btn = $('orderClearAllChangesBtn');
      if(btn) btn.textContent = 'もう一度でクリア';
      clearTimeout(clearAllChangesTimer);
      clearAllChangesTimer = setTimeout(() => {
        clearAllChangesArmed = false;
        const currentBtn = $('orderClearAllChangesBtn');
        if(currentBtn && isInitialMode()) currentBtn.textContent = '交代クリア';
      }, 2000);
      showToast('もう一度でクリア');
      return;
    }
    resetClearAllChangesConfirm();
    state.defenseChanges = {};
    if(state.battingMode === 'nine'){
      const baseLine = (state.lineupByInning?.[1] || state.battingOrder.slice(0, lineupLimit())).slice(0, lineupLimit());
      state.lineupByInning = { 1: baseLine };
    }else{
      state.lineupByInning = {};
    }
    ensureStructures();
    saveState();
    render();
    showToast('交代をクリアしました');
  }

  function render(){
    ensureStructures();
    applyLineupFont();
    renderHeader();
    renderInningButtons();

    renderOrder();
    renderBench();
    renderMemo();
    renderPlayers();
    renderTabs();
    bindFormControlTapGuards();
  }

  function compactDate(dateStr){
    if(!dateStr) return '';
    const d = new Date(`${dateStr}T00:00:00`);
    if(Number.isNaN(d.getTime())) return dateStr.replaceAll('-','/');
    return `${d.getMonth() + 1}/${d.getDate()}`;
  }

  function gameSummaryText(g){
    return [
      compactDate(g.date),
      g.place,
      g.start,
      g.opponent ? `vs ${g.opponent}` : '',
      g.innings ? `${g.innings}回` : ''
    ].filter(Boolean).join('  ') || '試合情報未設定';

    $('gameSummary').textContent = gameSummaryText(state.game);

  function renderOrder(){
    const list = $('orderList');
    const inning = activeInning();
    const pids = getLineupAt(inning);
    const globalDefenseColumns = defenseColumns();
    const hasDefenseChangeMode = globalDefenseColumns.length > 1;
    const maxFlowCount = hasDefenseChangeMode ? globalDefenseColumns.length : 1;
    const orderCard = document.querySelector('.order-card');
    orderCard?.classList.toggle('has-defense-changes', hasDefenseChangeMode);
    orderCard?.classList.toggle('has-compact-defense-chips', hasDefenseChangeMode && maxFlowCount >= 4);
    orderCard?.classList.toggle('has-ultra-defense-chips', hasDefenseChangeMode && maxFlowCount >= 5);
    orderCard?.classList.toggle('has-many-defense-chips', hasDefenseChangeMode && maxFlowCount >= 7);
    list.innerHTML = '';
    pids.forEach((pid, index) => {
      const player = playerById(pid);
      if(!player) return;
      const useTimeline = hasDefenseChangeMode;
      const cols = useTimeline
        ? globalDefenseColumns.map(col => ({ ...col, item:defenseColumnItem(pid, col) }))
        : [{ key:'start', label:'初', inning:1, item:defenseColumnItem(pid, globalDefenseColumns[0]) }];
      const hasChange = cols.some(col => col.key !== 'start' && col.item);
      const isSwapSelected = selectedSwapId === pid;
      const isDefSelected = selectedDefense?.playerId === pid;
      const isSwapFadingOut = swapFadeOutIds.has(pid);
      const isSwapFadingIn = swapFadeInIds.has(pid);
      const hasTapFeedback = tapFeedbackIds.has(pid);
      const showSwapSelected = isSwapSelected;
      const groupClass = 'player-main-group' + (useTimeline ? ' timeline-defense' : ' single-defense') + (showSwapSelected ? ' is-selected-row' : '') + (hasTapFeedback ? ' tap-feedback' : '') + (isSwapFadingOut ? ' swap-fade-out is-swapping' : '') + (isSwapFadingIn ? ' swap-fade-in is-swapping' : '');
      const row = document.createElement('div');
      row.className = 'order-row' + (hasChange ? ' has-change' : '');
      const main = document.createElement('div');
      main.className = 'order-main';
      const playerLabel = isInitialMode() ? '打順入替で選択' : '交代で選択';
      const numberLabel = playerNumber(pid);
      main.innerHTML = `
        <div class="order-no">${index + 1}</div>
        <div class="${groupClass}">
<button type="button" class="player-name player-card" aria-label="${escapeAttr(displayName(pid))}${numberLabel ? ` 背番号${escapeAttr(numberLabel)}` : ''}${playerLabel}">
  <span class="player-name-text">${escapeHtml(displayName(pid))}</span>
  ${numberLabel ? `<span class="player-number-badge" aria-label="背番号 ${escapeAttr(numberLabel)}">${escapeHtml(numberLabel)}</span>` : ''}
</button>
<div class="pos-flow defense-card" role="button" tabindex="0" aria-label="守備履歴"></div>
        </div>
      `;
      const playerButton = main.querySelector('.player-name');
      playerButton.style.borderLeftColor = player.color || '#94a3b8';
      bindQuickTap(playerButton, () => handlePlayerTap(pid), {
        feedbackElement: () => playerButton.closest('.player-main-group')
      });
      const posFlow = main.querySelector('.pos-flow');
      const isDefenseFadingOut = defenseSwapFadeOutIds.has(pid);
      const isDefenseFadingIn = defenseSwapFadeInIds.has(pid);
      const hasDefenseTapFeedback = defenseTapFeedbackIds.has(pid);
      const showDefenseSelected = isDefSelected;
      posFlow.className = 'pos-flow defense-card' + (useTimeline ? ' timeline-defense' : ' single-defense') + (hasChange ? ' has-change' : '') + (showDefenseSelected ? ' def-selected is-defense-selected' : '') + (hasDefenseTapFeedback ? ' tap-feedback' : '') + (isDefenseFadingOut ? ' swap-fade-out is-chip-swapping' : '') + (isDefenseFadingIn ? ' swap-fade-in is-chip-swapping' : '');
      const activeKey = useTimeline ? activeDefenseColumnKey() : null;
      posFlow.style.setProperty('--defense-cols', cols.length);
      bindQuickTap(posFlow, () => handleDefenseTap(pid), {
        ignore: e => Boolean(e.target.closest('.pos-chip')),
        feedbackElement: () => posFlow
      });
      cols.forEach(col => {
        const item = col.item;
        const isActiveColumn = col.key === activeKey;
        const cell = document.createElement('div');
        cell.className = 'pos-cell' + (item ? '' : ' empty') + (isActiveColumn ? ' current-inning' : '');
        if(item){
          const short = posShort(item.pos);
          const chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'pos-chip ' + (item.start ? 'start' : 'change') + (short.length > 1 ? ' is-wide' : '') + (isActiveColumn ? ' current-inning' : '');
          chip.setAttribute('aria-label', `${col.key === 'start' ? '初期' : col.label + '回'}の守備 ${short}`);
          chip.innerHTML = `<span>${escapeHtml(short)}</span>`;
          bindQuickTap(chip, () => handleDefenseTap(pid), {
            feedbackElement: () => chip.closest('.defense-card') || chip
          });
          cell.appendChild(chip);
        }
        posFlow.appendChild(cell);
      });
      row.appendChild(main);
      list.appendChild(row);
    });
  }

  function renderBench(){
    const inning = activeInning();
    const lineup = new Set(getLineupAt(inning));
    const bench = state.players.filter(p => state.battingMode === 'nine' ? !lineup.has(p.id) : effectivePosition(p.id, inning) === 'B');
    $('benchCount').textContent = `${bench.length}人`;
    const wrap = $('benchList');
    wrap.innerHTML = '';
    if(!bench.length){ wrap.innerHTML = '<span class="empty-state">ベンチ表示なし</span>'; return; }
    bench.forEach(p => {
      const chip = document.createElement('button');
      chip.type = 'button';
      const hasTapFeedback = tapFeedbackIds.has(p.id);
      chip.className = 'bench-chip' + (selectedSwapId === p.id ? ' selected is-selected' : '') + (hasTapFeedback ? ' tap-feedback' : '') + (swapFadeOutIds.has(p.id) ? ' swap-fade-out is-swapping' : '') + (swapFadeInIds.has(p.id) ? ' swap-fade-in is-swapping' : '');
      chip.innerHTML = `<span class="dot" style="background:${escapeAttr(p.color)}"></span><span>${escapeHtml(displayName(p.id))}</span>`;
      bindQuickTap(chip, () => handlePlayerTap(p.id));
      wrap.appendChild(chip);
    });
  }

  function playersWithDefenseChanges(){
    return state.players.filter(p => defenseFlow(p.id).length > 1);
  }

  function formatGameDate(dateStr){
    if(!dateStr) return '';
    const d = new Date(`${dateStr}T00:00:00`);
    if(Number.isNaN(d.getTime())) return dateStr.replaceAll('-','/');
    const week = ['日','月','火','水','木','金','土'][d.getDay()];
    return `${String(d.getFullYear()).slice(-2)}/${d.getMonth()+1}/${d.getDate()}(${week})`;
  }

  function lineupChangeLines(){
    return lineupChangeLinesForState(state);
  }

  function lineupChangeLinesForState(st){
    if(st.battingMode !== 'nine') return [];
    const lines = [];
    for(let inning=2; inning<=maxInnings(st); inning++){
      const prev = getLineupAtIn(st, inning - 1);
      const cur = getLineupAtIn(st, inning);
      cur.forEach((pid, idx) => {
        if(prev[idx] && prev[idx] !== pid){
          lines.push(`${inning}回　${idx + 1}番　${displayNameIn(st, prev[idx])} → ${displayNameIn(st, pid)}　${posShort(effectivePositionIn(st, pid, inning))}`);
        }
      });
    }
    return lines;
  }

  function defenseChangeLines(){
    return defenseChangeLinesForState(state);
  }

  function defenseChangeLinesForState(st){
    const lines = [];
    const orderIndex = Object.fromEntries((st.battingOrder || []).map((id, i) => [id, i]));
    for(let inning=2; inning<=maxInnings(st); inning++){
      const changed = (st.players || [])
        .map(p => {
          const before = effectivePositionIn(st, p.id, inning - 1);
          const after = effectivePositionIn(st, p.id, inning);
          return { player:p, before, after };
        })
        .filter(x => x.before !== x.after)
        .filter(x => st.battingMode === 'all' || (x.before !== 'B' && x.after !== 'B'))
        .sort((a,b) => (orderIndex[a.player.id] ?? 999) - (orderIndex[b.player.id] ?? 999));
      changed.forEach(x => lines.push(`${inning}回　${displayNameIn(st, x.player.id)}　${posShort(x.before)} → ${posShort(x.after)}`));
    }
    return lines;
  }

  function buildSaveMemo(){
    return buildSaveMemoForState(state);
  }

  function buildSaveMemoForState(st){
    const g = st.game || {};
    const lines = [];
    const dateLine = [formatGameDate(g.date), g.opponent ? `vs ${g.opponent}` : ''].filter(Boolean).join(' ');
    const placeLine = [g.place ? `@${g.place}` : '', g.start ? `${g.start} 試合開始` : '', g.format || '', g.limit ? `${g.limit}分` : '', g.innings ? `${g.innings}回` : ''].filter(Boolean).join(' ');
    lines.push('【スターティングメンバー】');
    if(dateLine) lines.push(dateLine);
    if(placeLine) lines.push(placeLine);
    lines.push('');
    getLineupAtIn(st, 1).forEach((pid, idx) => {
      const number = playerNumberIn(st, pid);
      const numberText = number ? ` #${number}` : '';
      lines.push(`${idx + 1}　${displayNameIn(st, pid)}${numberText}　${posShort(st.startPositions?.[pid] || 'B')}`);
    });
    const lineupChanges = lineupChangeLinesForState(st);
    const defenseLines = defenseChangeLinesForState(st);
    if(defenseLines.length){
      lines.push('');
      lines.push('【守備変更】');
      defenseLines.forEach(line => lines.push(line));
    }
    if(lineupChanges.length){
      lines.push('');
      lines.push('【選手交代】');
      lineupChanges.forEach(line => lines.push(line));
    }
    return lines.join('\n');
  }

  function renderMemo(){
    const defenseCount = defenseChangeLines().length;
    const subCount = lineupChangeLines().length;
    $('memoChangeCount').textContent = `変更${defenseCount + subCount}件`;
    $('saveMemo').value = buildSaveMemo();
  }

  function normalizeSavedOrder(entry){
    if(!entry) return null;
    try{
      const source = entry.state || entry.snapshot || entry;
      const snapshot = normalizeState(clone(source));
      const savedAt = entry.savedAt || new Date().toISOString();
      const id = entry.id || `order-${Date.parse(savedAt) || Date.now()}-${Math.random().toString(36).slice(2,8)}`;
      return {
        id,
        savedAt,
        game: clone(snapshot.game),
        battingMode: snapshot.battingMode,
        dhEnabled: isDhEnabled(snapshot),
        displayMode: snapshot.settings?.displayMode || 'nick',
        players: clone(snapshot.players),
        battingOrder: clone(snapshot.battingOrder),
        startPositions: clone(snapshot.startPositions),
        defenseChanges: clone(snapshot.defenseChanges),
        lineupByInning: clone(snapshot.lineupByInning),
        benchPlayers: benchPlayersForState(snapshot).map(p => p.id),
        memo: entry.memo || buildSaveMemoForState(snapshot),
        state: snapshot
      };
    }catch(e){
      return null;
    }
  }

  function loadSavedOrders(){
    try{
      const parsed = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      if(!Array.isArray(parsed)) return [];
      return parsed.map(normalizeSavedOrder).filter(Boolean).sort((a,b) => String(b.savedAt).localeCompare(String(a.savedAt)));
    }catch(e){
      return [];
    }
  }

  function saveSavedOrders(list){
    const safe = list.map(normalizeSavedOrder).filter(Boolean).slice(0, MAX_SAVED_ORDERS);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(safe));
    return safe;
  }

  function benchPlayersForState(st){
    const lineup = new Set(getLineupAtIn(st, 1));
    return (st.players || []).filter(p => st.battingMode === 'nine' ? !lineup.has(p.id) : effectivePositionIn(st, p.id, 1) === 'B');
  }

  function createSavedOrderSnapshot(){
    const snapshot = normalizeState(clone(state));
    const savedAt = new Date().toISOString();
    const id = `order-${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
    return normalizeSavedOrder({ id, savedAt, state:snapshot, memo:buildSaveMemoForState(snapshot) });
  }

  function addSavedOrder(){
    const list = loadSavedOrders();
    const entry = createSavedOrderSnapshot();
    saveSavedOrders([entry, ...list]);
    return entry;
  }

  function saveCurrentOrder(){
    saveState(false);
    addSavedOrder();
    swipedHistoryId = null;
    renderMemo();
    renderHistory();
    showToast('保存しました');
  }

  function formatSavedAt(value){
    const d = new Date(value);
    if(Number.isNaN(d.getTime())) return '';
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  function modeLabelForState(st){
    return st.battingMode === 'nine' ? '9人制' : '全員打ち';
  }

  function gameTitleForState(st){
    const g = st.game || {};
    return [formatGameDate(g.date), g.opponent ? `vs ${g.opponent}` : ''].filter(Boolean).join(' ') || '保存オーダー';
  }

  function historyClosedTitle(st){
    const g = st.game || {};
    const dateTime = [compactDate(g.date) || '日付未入力', g.start || ''].filter(Boolean).join(' ');
    return `${dateTime} vs ${g.opponent || '未入力'}`;
  }

  function historyInfoLineForState(st){
    const g = st.game || {};
    return [
      g.place || '場所未入力',
      g.start || '',
      modeLabelForState(st),
      `${maxInnings(st)}回`,
      isDhEnabled(st) ? 'DHあり' : 'DHなし'
    ].filter(Boolean).join(' / ');
  }

  function changeCountForState(st){
    return defenseChangeLinesForState(st).length + lineupChangeLinesForState(st).length;
  }

  function renderHistory(){
    const wrap = $('historyList');
    if(!wrap) return;
    const entries = loadSavedOrders();
    $('historyCount').textContent = `${entries.length}件`;
    wrap.innerHTML = '';
    if(!entries.length){
      wrap.innerHTML = '<div class="history-empty">保存した記録はまだありません。</div>';
      return;
    }
    entries.forEach(entry => {
      const st = entry.state;
      const changes = changeCountForState(st);
      const isOpen = expandedHistoryId === entry.id;
      const isDeleteOpen = swipedHistoryId === entry.id;
      const card = document.createElement('article');

  function historyStarterRowHtml(st, pid, index){

  function historyExpandedHtml(entry, st, changes){

      </div>
    </div>`;

  function savedOrderById(id){
    return loadSavedOrders().find(entry => entry.id === id) || null;
  }

  function useSavedOrder(id, duplicate=false){
    const entry = savedOrderById(id);
    if(!entry) return;
    state = normalizeState(clone(entry.state));
    state.selectedInning = 0;
    selectedSwapId = null;
    selectedDefense = null;
    clearTapFeedback();
    clearSwapAnimationState();
    saveState(false);
    currentTab = 'order';
    expandedHistoryId = null;
    swipedHistoryId = null;
    render();

    showToast(duplicate ? '複製しました' : '読み込みました');

  function deleteSavedOrder(id){
    saveSavedOrders(loadSavedOrders().filter(entry => entry.id !== id));
    swipedHistoryId = null;
    if(expandedHistoryId === id) expandedHistoryId = null;
    renderHistory();
    showToast('記録を削除しました');
  }

  function handleHistoryAction(event){
    const button = event.target.closest('[data-history-action]');
    if(!button) return;
    event.preventDefault();
    event.stopPropagation();
    const id = button.dataset.historyId;
    const action = button.dataset.historyAction;
    if(action === 'toggle' && Date.now() < suppressHistoryTapUntil) return;
    if(action !== 'delete' && swipedHistoryId){
      swipedHistoryId = null;
      renderHistory();
      return;
    }
    if(action === 'toggle'){
      expandedHistoryId = expandedHistoryId === id ? null : id;
      renderHistory();
    }else if(action === 'load'){
      useSavedOrder(id, false);
    }else if(action === 'duplicate'){
      useSavedOrder(id, true);
    }else if(action === 'delete'){
      deleteSavedOrder(id);
    }else if(action === 'share'){
      const entry = savedOrderById(id);
      if(entry) shareOrder(entry.state);
    }
  }

  function clamp(value, min, max){
    return Math.min(max, Math.max(min, value));
  }

  function beginHistorySwipe(event){
    if(event.pointerType === 'touch') return;
    if(event.pointerType === 'mouse' && event.button !== 0) return;
    const surface = event.target.closest('[data-history-swipe-surface]');
    if(!surface) return;
    if(event.target.closest('.history-actions,.history-delete-action')) return;
    const isSummaryTap = !!event.target.closest('.history-summary');
    if(isFormControl(event.target) && !isSummaryTap) return;
    historySwipeState = {
      id: surface.dataset.historyId,
      surface,
      startX: event.clientX,
      startY: event.clientY,
      baseX: swipedHistoryId === surface.dataset.historyId ? -HISTORY_SWIPE_OPEN_PX : 0,
      lastX: swipedHistoryId === surface.dataset.historyId ? -HISTORY_SWIPE_OPEN_PX : 0,
      pointerId: event.pointerId,
      active: false,
      cancelled: false
    };
  }

  function moveHistorySwipe(event){
    const swipe = historySwipeState;
    if(!swipe || swipe.cancelled || event.pointerId !== swipe.pointerId) return;
    const dx = event.clientX - swipe.startX;
    const dy = event.clientY - swipe.startY;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    if(!swipe.active){
      if(absX < 8 && absY < 8) return;
      if(absY > absX * 1.15){
        swipe.cancelled = true;
        return;
      }
      if(absX <= absY + 6) return;
      swipe.active = true;
      swipe.surface.closest('.history-item')?.classList.add('is-swiping');
    }
    if(!swipe.active) return;
    event.preventDefault();
    const nextX = clamp(swipe.baseX + dx, -HISTORY_SWIPE_OPEN_PX, 0);
    swipe.lastX = nextX;
    swipe.surface.style.transform = `translateX(${nextX}px)`;
  }

  function endHistorySwipe(event){
    const swipe = historySwipeState;
    if(!swipe || event.pointerId !== swipe.pointerId) return;
    const item = swipe.surface.closest('.history-item');
    item?.classList.remove('is-swiping');
    swipe.surface.style.transform = '';
    if(swipe.active){
      suppressHistoryTapUntil = Date.now() + 180;
      swipedHistoryId = swipe.lastX <= -HISTORY_SWIPE_THRESHOLD_PX ? swipe.id : null;
      renderHistory();
    }
    historySwipeState = null;
  }

  function setupHistorySwipe(){
    const list = $('historyList');
    list.addEventListener('pointerdown', beginHistorySwipe, { capture:true });
    window.addEventListener('pointermove', moveHistorySwipe, { passive:false });
    window.addEventListener('pointerup', endHistorySwipe, { capture:true });
    window.addEventListener('pointercancel', endHistorySwipe, { capture:true });
  }

  function switchTab(tab, scrollTop = true){
    if(!TAB_ORDER.includes(tab)) return;
    currentTab = tab;
    selectedSwapId = null;
    selectedDefense = null;
    swipedHistoryId = null;
    renderTabs();
    if(scrollTop) window.scrollTo({ top:0, behavior:'auto' });
  }

  function shouldIgnorePageSwipeTarget(target){
    if(!target) return true;
    if(target.closest?.('input, select, textarea, [contenteditable="true"], [contenteditable=""]')) return true;
    const button = target.closest?.('button');
    if(button && !button.closest('.history-summary,.player-card,.pos-chip,.bench-chip')) return true;
    return !!target.closest?.('.bottom-nav,.settings-modal,.inning-scroll,.memo-actions,.date-button,.calendar-panel,.settings-sheet,.history-delete-action,.history-actions');
  }

  function currentTabIndex(){
    return Math.max(0, TAB_ORDER.indexOf(currentTab));
  }

  function dampPageDragOffset(dx){
    const index = currentTabIndex();
    const atEdge = (dx > 0 && index === 0) || (dx < 0 && index === TAB_ORDER.length - 1);
    if(!atEdge) return dx;
    return clamp(dx * 0.30, -PAGE_SWIPE_EDGE_MAX_PX, PAGE_SWIPE_EDGE_MAX_PX);
  }

  function applyTabsTrackPosition(dragOffset = 0, dragging = false){
    const track = $('tabsTrack');
    if(!track) return;
    const index = currentTabIndex();
    track.classList.toggle('is-dragging', dragging && !reducedMotion());
    const offset = reducedMotion() ? 0 : dragOffset;
    track.style.transform = `translate3d(calc(${-index * 100}% + ${offset}px),0,0)`;
  }

  function setTabsTrackPosition(dragOffset = 0, dragging = false){
    if(!dragging){
      if(tabsTrackFrame){
        cancelAnimationFrame(tabsTrackFrame);
        tabsTrackFrame = null;
        tabsTrackPending = null;
      }
      applyTabsTrackPosition(dragOffset, false);
      return;
    }
    tabsTrackPending = { dragOffset, dragging };
    if(tabsTrackFrame) return;
    tabsTrackFrame = requestAnimationFrame(() => {
      tabsTrackFrame = null;
      const next = tabsTrackPending;
      tabsTrackPending = null;
      if(next) applyTabsTrackPosition(next.dragOffset, next.dragging);
    });
  }

  function setPageSwipeFeedback(dx){
    setTabsTrackPosition(dampPageDragOffset(dx), true);
  }

  function clearPageSwipeFeedback(){
    setTabsTrackPosition(0, false);
  }

  function startPageSwipe(clientX, clientY, target, pointerId, timeStamp, source){
    if(shouldIgnorePageSwipeTarget(target)) return;
    const historyItem = target.closest?.('.history-item');
    pageSwipeState = {
      startX: clientX,
      startY: clientY,
      lastX: clientX,
      lastY: clientY,
      startTime: timeStamp || performance.now(),
      pointerId,
      source,
      historyId: currentTab === 'history' ? historyItem?.dataset.historyId || null : null,
      active: false,
      cancelled: false
    };
  }

  function updatePageSwipe(clientX, clientY, timeStamp, event){
    const swipe = pageSwipeState;
    if(!swipe || swipe.cancelled) return;
    const dx = clientX - swipe.startX;
    const dy = clientY - swipe.startY;
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    swipe.lastX = clientX;
    swipe.lastY = clientY;
    if(!swipe.active){
      if(absX < PAGE_SWIPE_LOCK_PX && absY < PAGE_SWIPE_LOCK_PX) return;
      if(absY > absX * PAGE_SWIPE_VERTICAL_CANCEL_RATIO){
        swipe.cancelled = true;
        return;
      }
      if(absX <= absY * PAGE_SWIPE_HORIZONTAL_RATIO) return;
      swipe.active = true;
      suppressQuickTapUntil = Date.now() + 260;
      clearTapFeedback();
    }
    if(swipe.active){
      suppressQuickTapUntil = Date.now() + 260;
      event.preventDefault();
      setPageSwipeFeedback(dx);
    }
  }

  function pageSwipeAction(swipe, dx, dy, timeStamp, live = false){
    const absX = Math.abs(dx);
    const absY = Math.abs(dy);
    const elapsed = Math.max(1, (timeStamp || performance.now()) - swipe.startTime);
    const velocity = absX / elapsed;
    const distanceTrigger = absX >= PAGE_SWIPE_THRESHOLD_PX;
    const flickTrigger = absX >= PAGE_SWIPE_FLICK_PX && velocity >= PAGE_SWIPE_VELOCITY_PX_MS;
    const cardDeleteTrigger = swipe.historyId && dx < 0 && absX >= HISTORY_SWIPE_THRESHOLD_PX && absX > absY * PAGE_SWIPE_HORIZONTAL_RATIO;
    const closeDeleteTrigger = swipe.historyId && swipedHistoryId === swipe.historyId && dx > PAGE_SWIPE_FLICK_PX;
    const historyCardLeftSwipe = swipe.historyId && dx < 0;
    if(!swipe.active || absX <= absY * PAGE_SWIPE_HORIZONTAL_RATIO) return null;
    if(closeDeleteTrigger) return { type:'close-delete' };
    if(cardDeleteTrigger) return { type:'open-delete', id:swipe.historyId };
    if(live && historyCardLeftSwipe) return null;
    if(distanceTrigger || flickTrigger){
      const currentIndex = TAB_ORDER.indexOf(currentTab);
      const nextIndex = dx < 0 ? currentIndex + 1 : currentIndex - 1;
      if(nextIndex >= 0 && nextIndex < TAB_ORDER.length) return { type:'tab', tab:TAB_ORDER[nextIndex] };
    }
    return null;
  }

  function applyPageSwipeAction(action){
    clearPageSwipeFeedback();
    pageSwipeState = null;
    if(action.type === 'close-delete'){
      swipedHistoryId = null;
      renderHistory();
    }else if(action.type === 'open-delete'){
      swipedHistoryId = action.id;
      renderHistory();
    }else if(action.type === 'tab'){
      switchTab(action.tab);
    }
  }

  function finishPageSwipe(clientX, clientY, timeStamp, pointerId){
    const swipe = pageSwipeState;
    if(!swipe || pointerId !== swipe.pointerId) return;
    const dx = clientX - swipe.startX;
    const dy = clientY - swipe.startY;
    if(swipe.active) suppressQuickTapUntil = Date.now() + 260;
    const action = pageSwipeAction(swipe, dx, dy, timeStamp, false);
    if(action) applyPageSwipeAction(action);
    else clearPageSwipeFeedback();
    pageSwipeState = null;
  }

  function beginPageSwipe(event){
    if(event.pointerType === 'touch') return;
    if(event.pointerType === 'mouse' && event.button !== 0) return;
    if(!event.target.closest?.('.app')) return;
    if(swipedHistoryId && !event.target.closest('.history-item')){
      swipedHistoryId = null;
      renderHistory();
      return;
    }
    startPageSwipe(event.clientX, event.clientY, event.target, event.pointerId, event.timeStamp, 'pointer');
  }

  function movePageSwipe(event){
    const swipe = pageSwipeState;
    if(!swipe || swipe.source !== 'pointer' || swipe.cancelled || event.pointerId !== swipe.pointerId) return;
    updatePageSwipe(event.clientX, event.clientY, event.timeStamp, event);
  }

  function endPageSwipe(event){
    const swipe = pageSwipeState;
    if(!swipe || swipe.source !== 'pointer') return;
    finishPageSwipe(event.clientX, event.clientY, event.timeStamp, event.pointerId);
  }

  function beginTouchPageSwipe(event){
    if(event.touches.length !== 1) return;
    if(!event.target.closest?.('.app')) return;
    const touch = event.touches[0];
    if(swipedHistoryId && !event.target.closest('.history-item')){
      swipedHistoryId = null;
      renderHistory();
      return;
    }
    startPageSwipe(touch.clientX, touch.clientY, event.target, touch.identifier, event.timeStamp, 'touch');
  }

  function moveTouchPageSwipe(event){
    const swipe = pageSwipeState;
    if(!swipe || swipe.source !== 'touch' || swipe.cancelled) return;
    const touch = [...event.touches].find(t => t.identifier === swipe.pointerId);
    if(!touch) return;
    updatePageSwipe(touch.clientX, touch.clientY, event.timeStamp, event);
  }

  function endTouchPageSwipe(event){
    const swipe = pageSwipeState;
    if(!swipe || swipe.source !== 'touch') return;
    const touch = [...event.changedTouches].find(t => t.identifier === swipe.pointerId);
    finishPageSwipe(touch?.clientX ?? swipe.lastX, touch?.clientY ?? swipe.lastY, event.timeStamp, swipe.pointerId);
  }

  function setupPageSwipe(){
    const app = document.querySelector('.app');
    app.addEventListener('pointerdown', beginPageSwipe, { capture:true });
    window.addEventListener('pointermove', movePageSwipe, { passive:false });
    window.addEventListener('pointerup', endPageSwipe, { capture:true });
    window.addEventListener('pointercancel', endPageSwipe, { capture:true });
    document.addEventListener('touchstart', beginTouchPageSwipe, { capture:true, passive:true });
    window.addEventListener('touchmove', moveTouchPageSwipe, { passive:false });
    window.addEventListener('touchend', endTouchPageSwipe, { capture:true });
    window.addEventListener('touchcancel', endTouchPageSwipe, { capture:true });
  }

  function setupZoomGuards(){
    const preventZoom = event => {
      event.preventDefault();
    };
    ['gesturestart','gesturechange','gestureend'].forEach(type => {
      document.addEventListener(type, preventZoom, { passive:false });
    });
    document.addEventListener('touchmove', event => {
      if(event.touches && event.touches.length > 1) event.preventDefault();
    }, { passive:false });
    document.addEventListener('dblclick', event => {
      if(!isFormControl(event.target)) event.preventDefault();
    }, { passive:false });
  }

  function renderTabs(){

    $(`${currentTab}Panel`).classList.add('active');

  function addPlayer(){
    const nickInput = $('newNick');
    const fullInput = $('newFull');
    const nick = nickInput.value.trim();
    const full = fullInput.value.trim();
    if(!nick && !full) return;
    const id = `p${Date.now().toString(36)}`;
